<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FinControl — Gestão Financeira</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#0a0c14; --surface:#111420; --card:#181c2a; --border:#222638;
      --accent:#3d7bff; --accent2:#00e5a0; --danger:#ff4d6d; --warn:#ffb020;
      --purple:#c084fc; --text:#e4e8f4; --muted:#5e6785;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;line-height:1.6;min-height:100vh;}
    /* Garante fundo escuro enquanto carrega */
    html{background:#0a0c14;}

    /* LOGIN */
    .login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
    .login-bg{position:absolute;inset:0;background:radial-gradient(ellipse at 20% 50%,rgba(61,123,255,.15) 0%,transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(0,229,160,.1) 0%,transparent 50%);}
    .login-card{position:relative;background:var(--card);border:1px solid var(--border);border-radius:20px;padding:40px 44px;width:420px;max-width:95vw;}
    .login-logo{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;letter-spacing:-.5px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px;}
    .login-sub{font-size:13px;color:var(--muted);margin-bottom:32px;}
    .login-title{font-family:'Syne',sans-serif;font-size:19px;font-weight:700;margin-bottom:22px;}
    .lf{display:flex;flex-direction:column;gap:5px;margin-bottom:14px;}
    .ll{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);}
    .li{background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:11px 14px;color:var(--text);font-size:14px;font-family:'DM Sans',sans-serif;width:100%;transition:border-color .2s;}
    .li:focus{outline:none;border-color:var(--accent);}
    .li.err{border-color:var(--danger);}
    .login-btn{width:100%;padding:12px;background:linear-gradient(135deg,var(--accent),#2563eb);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;margin-top:8px;transition:opacity .2s;}
    .login-btn:hover{opacity:.88;}
    .login-hint{margin-top:20px;padding:14px 16px;background:rgba(61,123,255,.08);border:1px solid rgba(61,123,255,.2);border-radius:10px;font-size:12.5px;color:var(--muted);}
    .login-err{color:var(--danger);font-size:12.5px;margin-top:8px;text-align:center;}

    /* APP */
    .app{display:flex;min-height:100vh;}
    .sidebar{width:232px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:100;}
    .sb-logo{padding:24px 22px 18px;border-bottom:1px solid var(--border);}
    .logo-name{font-family:'Syne',sans-serif;font-size:21px;font-weight:800;letter-spacing:-.5px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
    .logo-sub{font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-top:2px;}
    .sb-nav{flex:1;padding:14px 10px;display:flex;flex-direction:column;gap:2px;}
    .nav-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--muted);padding:10px 12px 4px;}
    .nav-item{display:flex;align-items:center;gap:11px;padding:10px 13px;border-radius:9px;cursor:pointer;color:var(--muted);font-size:13.5px;font-weight:500;transition:all .15s;border:1px solid transparent;}
    .nav-item:hover{background:var(--card);color:var(--text);}
    .nav-item.active{background:rgba(61,123,255,.12);color:var(--accent);border-color:rgba(61,123,255,.2);}
    .sb-foot{padding:14px 20px;border-top:1px solid var(--border);display:flex;align-items:center;gap:10px;justify-content:space-between;}
    .avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0;}
    .logout-btn{background:none;border:none;cursor:pointer;color:var(--muted);padding:4px;border-radius:6px;transition:color .15s;}
    .logout-btn:hover{color:var(--danger);}
    .main{flex:1;margin-left:232px;min-height:100vh;}
    .ph{padding:28px 34px 0;margin-bottom:22px;}
    .ph-row{display:flex;align-items:flex-start;justify-content:space-between;}
    .pt{font-family:'Syne',sans-serif;font-size:25px;font-weight:700;letter-spacing:-.5px;}
    .ps{color:var(--muted);font-size:13px;margin-top:3px;}
    .pc{padding:0 34px 34px;}
    .card{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:18px 20px;}
    .card-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.9px;color:var(--muted);margin-bottom:14px;}
    .kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px;}
    .kpi{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:18px 20px;position:relative;overflow:hidden;}
    .kpi::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
    .kpi.b::after{background:linear-gradient(90deg,var(--accent),transparent);}
    .kpi.g::after{background:linear-gradient(90deg,var(--accent2),transparent);}
    .kpi.r::after{background:linear-gradient(90deg,var(--danger),transparent);}
    .kpi.y::after{background:linear-gradient(90deg,var(--warn),transparent);}
    .kpi-lbl{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:9px;}
    .kpi-val{font-family:'Syne',sans-serif;font-size:23px;font-weight:700;letter-spacing:-.5px;line-height:1;margin-bottom:9px;}
    .kpi-delta{font-size:11.5px;display:flex;align-items:center;gap:4px;}
    .up{color:var(--accent2);} .dn{color:var(--danger);}
    .psel{display:flex;gap:3px;background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:3px;}
    .pbtn{padding:6px 14px;border-radius:7px;font-size:12.5px;font-weight:500;cursor:pointer;color:var(--muted);border:none;background:none;font-family:'DM Sans',sans-serif;transition:all .15s;}
    .pbtn.active{background:var(--card);color:var(--text);border:1px solid var(--border);}
    .tw{overflow-x:auto;border-radius:13px;border:1px solid var(--border);}
    table{width:100%;border-collapse:collapse;}
    thead th{background:var(--surface);padding:11px 15px;text-align:left;font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);border-bottom:1px solid var(--border);}
    tbody td{padding:12px 15px;border-bottom:1px solid rgba(34,38,56,.5);font-size:13px;}
    tbody tr:last-child td{border-bottom:none;}
    tbody tr:hover td{background:rgba(255,255,255,.015);}
    .badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;}
    .bb{background:rgba(61,123,255,.14);color:#6fa0ff;} .bg{background:rgba(0,229,160,.12);color:#00e5a0;}
    .br{background:rgba(255,77,109,.12);color:#ff4d6d;} .by{background:rgba(255,176,32,.12);color:#ffb020;}
    .bp{background:rgba(192,132,252,.12);color:#c084fc;}
    .stabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:22px;}
    .stab{padding:10px 18px;font-size:13px;font-weight:500;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;transition:all .15s;margin-bottom:-1px;}
    .stab.active{color:var(--accent);border-bottom-color:var(--accent);}
    .btn{display:inline-flex;align-items:center;gap:7px;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:'DM Sans',sans-serif;transition:all .15s;}
    .btn-p{background:var(--accent);color:#fff;} .btn-p:hover{background:#2d6bef;}
    .btn-g{background:transparent;color:var(--muted);border:1px solid var(--border);} .btn-g:hover{background:var(--card);color:var(--text);}
    .fg{display:flex;flex-direction:column;gap:5px;}
    .fl{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);}
    .fi{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:9px 13px;color:var(--text);font-size:13px;font-family:'DM Sans',sans-serif;width:100%;transition:border-color .15s;}
    .fi:focus{outline:none;border-color:var(--accent);}
    .dc{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px 20px;margin-bottom:12px;}
    .dc-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;}
    .dc-name{font-family:'Syne',sans-serif;font-size:15px;font-weight:600;}
    .dc-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;}
    .dc-stat-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin-bottom:3px;}
    .dc-stat-val{font-size:14px;font-weight:700;}
    .pb{height:5px;background:var(--surface);border-radius:5px;overflow:hidden;margin-top:12px;}
    .pf{height:100%;border-radius:5px;transition:width .5s ease;}
    .dre-sec{padding:8px 0;border-bottom:1px solid var(--border);}
    .dre-sec-t{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);padding:6px 0 2px;}
    .dre-row{display:flex;justify-content:space-between;padding:6px 0 6px 14px;font-size:13px;border-bottom:1px solid rgba(34,38,56,.4);}
    .dre-row:last-child{border-bottom:none;}
    .dre-tot{display:flex;justify-content:space-between;padding:10px 0;font-family:'Syne',sans-serif;font-size:14.5px;font-weight:700;}
    .sg{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:20px;}
    .sc{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px 18px;}
    .sc-lbl{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);margin-bottom:7px;}
    .sc-val{font-family:'Syne',sans-serif;font-size:21px;font-weight:700;}
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);display:flex;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(5px);}
    .modal{background:var(--surface);border:1px solid var(--border);border-radius:15px;padding:26px;width:580px;max-width:95vw;max-height:90vh;overflow-y:auto;}
    .modal-t{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;margin-bottom:18px;}
    .tt{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 13px;font-size:12px;}
    .tt-lbl{font-family:'Syne',sans-serif;font-weight:600;margin-bottom:5px;}
    .tt-row{display:flex;align-items:center;gap:7px;color:var(--muted);margin-top:2px;}
    .tt-dot{width:7px;height:7px;border-radius:50%;}
    .cg{color:var(--accent2);} .cr{color:var(--danger);} .cb{color:var(--accent);}
    .cy{color:var(--warn);} .cp{color:var(--purple);} .cm{color:var(--muted);}
    ::-webkit-scrollbar{width:5px;height:5px;}
    ::-webkit-scrollbar-track{background:transparent;}
    ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
    #loading{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999;flex-direction:column;gap:16px;}
    .spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>

  window.__fcTimeout = setTimeout(function() {
    var ld = document.getElementById('loading');

  }, 20000);
</script>

// ── LOGIN ─────────────────────────────────────────────────────────────────────
function Login({ onLogin }) {
  const [email, setEmail]   = useState('');
  const [senha, setSenha]   = useState('');
  const [erro, setErro]     = useState('');
  const [showPw, setShowPw] = useState(false);
  const [loading, setLoading] = useState(false);

  const entrar = () => {
    setErro('');
    if (!email || !senha) { setErro('Preencha e-mail e senha.'); return; }
    setLoading(true);
    setTimeout(() => {
      const user = USERS.find(u => u.email === email.trim().toLowerCase() && u.senha === senha);
      if (user) { onLogin(user); }
      else { setErro('E-mail ou senha incorretos.'); setLoading(false); }
    }, 600);
  };

  const handleKey = e => { if (e.key === 'Enter') entrar(); };

  return (
    <div className="login-wrap">
      <div className="login-bg"/>
      <div className="login-card">
        <div className="login-logo">FinControl</div>
        <div className="login-sub">Plataforma de gestão financeira empresarial</div>
        <div className="login-title">Acesse sua conta</div>

        <div className="lf">
          <label className="ll">E-mail</label>
          <input className={`li${erro?'':''}`} type="email" placeholder="seu@email.com"
            value={email} onChange={e=>setEmail(e.target.value)} onKeyDown={handleKey} autoFocus/>
        </div>

        <div className="lf">
          <label className="ll">Senha</label>
          <div style={{position:'relative'}}>
            <input className="li" type={showPw?'text':'password'} placeholder="••••••••"
              value={senha} onChange={e=>setSenha(e.target.value)} onKeyDown={handleKey}
              style={{paddingRight:44}}/>
            <button onClick={()=>setShowPw(!showPw)}
              style={{position:'absolute',right:12,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',cursor:'pointer',color:'var(--muted)'}}>
              <IC n={showPw?'eyeoff':'eye'} s={16} c="var(--muted)"/>
            </button>
          </div>
        </div>

        {erro && <div className="login-err">{erro}</div>}

        <button className="login-btn" onClick={entrar} disabled={loading}>
          {loading ? 'Entrando...' : 'Entrar'}
        </button>

        <div className="login-hint">
          <div style={{fontWeight:600,color:'var(--text)',marginBottom:6,fontSize:12}}>Conta de teste:</div>
          <div>📧 <strong>admin@empresa.com</strong></div>
          <div style={{marginTop:2}}>🔑 <strong>admin123</strong></div>
          <div style={{marginTop:8,borderTop:'1px solid var(--border)',paddingTop:8}}>
            <div>📧 <strong>teste@fincontrol.com</strong></div>
            <div style={{marginTop:2}}>🔑 <strong>teste123</strong></div>
          </div>
        </div>
      </div>
    </div>
  );
}

                <td style={{textAlign:'right',fontWeight:700,color:'var(--danger)',fontVariantNumeric:'tabular-nums'}}>{fmt(T.custos)}</td>
                <td style={{textAlign:'right',fontWeight:700,color:'var(--warn)',fontVariantNumeric:'tabular-nums'}}>{fmt(T.despOp)}</td>
                <td style={{textAlign:'right',fontWeight:700,color:'var(--danger)',fontVariantNumeric:'tabular-nums'}}>{fmt(T.impostos)}</td>
                <td style={{textAlign:'right',fontWeight:700,color:'var(--accent2)',fontVariantNumeric:'tabular-nums'}}>{fmt(T.lucro)}</td>
                <td style={{textAlign:'right'}}><span className="badge bg">{fmtP((T.lucro/T.fat)*100)}</span></td>
              </tr>}
            </tbody>
          </table></div>
        </>}
        {sub==='DRE' && (
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:20}}>
            <div className="card">
              <div className="card-title">DRE — Demonstração do Resultado</div>
              <div style={{fontSize:11.5,color:'var(--muted)',marginBottom:14}}>Período: {period} · 2025</div>
              {[
                {title:'Receita',rows:[{l:'Receita Bruta de Serviços',v:T.fat,c:'cg'},{l:'(-) Deduções s/ Receita',v:-T.ded,c:'cr'}],tot:{l:'= Receita Líquida',v:T.recLiq,c:'cg'}},
                {title:'Custos',rows:[{l:'(-) Custo de Serviços (CSP)',v:-T.cmv,c:'cr'},{l:'(-) Custos Indiretos',v:-(T.custos-T.cmv),c:'cr'}],tot:{l:'= Lucro Bruto',v:T.lucroBruto,c:'cb'}},
                {title:'Despesas Operacionais',rows:[{l:'(-) Despesas com Pessoal',v:-T.despOp*.5,c:'cy'},{l:'(-) Despesas Administrativas',v:-T.despOp*.3,c:'cy'},{l:'(-) Despesas com Marketing',v:-T.despOp*.2,c:'cy'}],tot:{l:'= EBITDA',v:T.ebitda,c:'cp'}},
                {title:'Resultado Financeiro',rows:[{l:'(-) Encargos Financeiros',v:-T.impostos*.4,c:'cr'},{l:'(-) Provisão IRPJ/CSLL',v:-T.impostos*.6,c:'cr'}],tot:{l:'= RESULTADO LÍQUIDO',v:T.lucro,c:T.lucro>0?'cg':'cr',big:true}},
              ].map((sec,si)=>(
                <div key={si} className="dre-sec">
                  <div className="dre-sec-t">{sec.title}</div>
                  {sec.rows.map((r,ri)=><div key={ri} className="dre-row"><span className={r.c}>{r.l}</span><span className={r.c} style={{fontWeight:600}}>{r.v<0?`(${fmt(Math.abs(r.v))})`:fmt(r.v)}</span></div>)}
                  <div className="dre-tot" style={sec.tot.big?{borderTop:'2px solid #222638',paddingTop:14,marginTop:4}:{}}>
                    <span style={sec.tot.big?{fontSize:16}:{}}>{sec.tot.l}</span>
                    <span className={sec.tot.c} style={sec.tot.big?{fontSize:16}:{}}>{fmt(sec.tot.v)}</span>
                  </div>
                </div>
              ))}
            </div>
            <div>
              <div className="card" style={{marginBottom:16}}>
                <div className="card-title">Indicadores</div>
                {[
                  {label:'Margem Bruta',    val:(T.lucroBruto/T.fat)*100, c:'#3d7bff'},
                  {label:'Margem EBITDA',   val:(T.ebitda/T.fat)*100,     c:'#c084fc'},
                  {label:'Margem Líquida',  val:(T.lucro/T.fat)*100,      c:'#00e5a0'},
                  {label:'Custo s/ Receita',val:(T.custos/T.fat)*100,     c:'#ff4d6d'},
                  {label:'Desp.Op. s/ Rec.',val:(T.despOp/T.fat)*100,     c:'#ffb020'},
                ].map((item,i)=>(
                  <div key={i} style={{padding:'11px 0',borderBottom:i<4?'1px solid #222638':'none'}}>
                    <div style={{display:'flex',justifyContent:'space-between',marginBottom:5}}>
                      <span style={{fontSize:13,color:'var(--muted)'}}>{item.label}</span>
                      <span style={{fontWeight:700,color:item.c}}>{fmtP(item.val)}</span>
                    </div>
                    <div className="pb"><div className="pf" style={{width:`${Math.min(item.val,100)}%`,background:item.c,opacity:.7}}/></div>
                  </div>
                ))}
              </div>
              <div className="card">
                <div className="card-title">Cascata de Resultado</div>
                <ResponsiveContainer width="100%" height={185}>
                  <BarChart data={[{name:'Rec.Bruta',val:T.fat},{name:'Rec.Líq.',val:T.recLiq},{name:'L.Bruto',val:T.lucroBruto},{name:'EBITDA',val:T.ebitda},{name:'Líquido',val:T.lucro}]} margin={{top:8,right:8,left:0,bottom:0}}>
                    <CartesianGrid strokeDasharray="3 3" stroke="#222638" vertical={false}/>
                    <XAxis dataKey="name" tick={{fill:'#5e6785',fontSize:10}} axisLine={false} tickLine={false}/>
                    <YAxis tick={{fill:'#5e6785',fontSize:10}} axisLine={false} tickLine={false} tickFormatter={v=>`${(v/1000).toFixed(0)}k`}/>
                    <Tooltip content={<TT/>}/>
                    <Bar dataKey="val" name="Valor" radius={[5,5,0,0]}>{['#3d7bff','#6fa0ff','#c084fc','#ffb020','#00e5a0'].map((c,i)=><Cell key={i} fill={c}/>)}</Bar>
                  </BarChart>
                </ResponsiveContainer>
              </div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ── ENDIVIDAMENTO ─────────────────────────────────────────────────────────────
function Endividamento() {
  const [debts, setDebts] = useState(DEBTS0);
  const [modal, setModal] = useState(false);
  const [form, setForm] = useState({nome:'',valorTotal:'',parcela:'',qtd:'',pagas:'',juros:'',inicio:''});
  const FAT = 167000;
  const totP = debts.reduce((s,d)=>s+d.parcela,0);
  const totD = debts.reduce((s,d)=>s+Math.max(0,d.valorTotal-d.pagas*d.parcela),0);
  const pct  = (totP/FAT)*100;
  const rest = d=>d.qtd-d.pagas, saldD=d=>Math.max(0,d.valorTotal-d.pagas*d.parcela), pctQ=d=>Math.min(100,(d.pagas/d.qtd)*100);
  const add = ()=>{
    if(!form.nome||!form.valorTotal) return;
    setDebts([...debts,{id:Date.now(),nome:form.nome,valorTotal:+form.valorTotal,parcela:+form.parcela,qtd:+form.qtd,pagas:+form.pagas||0,juros:+form.juros||0,inicio:form.inicio}]);
    setForm({nome:'',valorTotal:'',parcela:'',qtd:'',pagas:'',juros:'',inicio:''});
    setModal(false);
  };
  const maxM = Math.max(...debts.map(d=>rest(d)));
  const projChart = Array.from({length:Math.min(maxM,24)},(_,i)=>({mes:`M${i+1}`,total:debts.reduce((s,d)=>i<rest(d)?s+d.parcela:s,0)}));
  const fields=[{k:'nome',label:'Nome da Dívida',type:'text',ph:'Empréstimo Banco X',full:true},{k:'valorTotal',label:'Valor Total (R$)',type:'number',ph:'120000'},{k:'parcela',label:'Valor da Parcela (R$)',type:'number',ph:'3850'},{k:'qtd',label:'Qtd. de Parcelas',type:'number',ph:'36'},{k:'pagas',label:'Parcelas Já Pagas',type:'number',ph:'0'},{k:'juros',label:'Juros (% a.m.)',type:'number',ph:'1.5'},{k:'inicio',label:'Data de Início',type:'text',ph:'Jan/2025'}];
  return (
    <div>
      <div className="ph">
        <div className="ph-row">
          <div><div className="pt">Endividamento</div><div className="ps">Gestão de dívidas e comprometimento de receita</div></div>
          <button className="btn btn-p" onClick={()=>setModal(true)}><IC n="plus" s={15} c="#fff"/> Nova Dívida</button>
        </div>
      </div>
      <div className="pc">
        <div className="kpi-grid">
          <div className="kpi r"><div className="kpi-lbl">Saldo Devedor Total</div><div className="kpi-val cr">{fmt(totD)}</div></div>
          <div className="kpi y"><div className="kpi-lbl">Parcelas / Mês</div><div className="kpi-val">{fmt(totP)}</div></div>
          <div className={`kpi ${pct>15?'r':'g'}`}><div className="kpi-lbl">% do Faturamento</div><div className={`kpi-val ${pct>15?'cr':'cg'}`}>{fmtP(pct)}</div><div style={{fontSize:11,color:'var(--muted)',marginTop:5}}>{pct>15?'⚠ Nível elevado':'✓ Nível saudável'}</div></div>
          <div className="kpi b"><div className="kpi-lbl">Dívidas Ativas</div><div className="kpi-val">{debts.length}</div></div>
        </div>
        {debts.map(d=>(
          <div key={d.id} className="dc">
            <div className="dc-head">
              <div><div className="dc-name">{d.nome}</div><div style={{fontSize:11.5,color:'var(--muted)',marginTop:2}}>Início: {d.inicio} · Juros: {fmtP(d.juros)} a.m.</div></div>
              <div style={{display:'flex',gap:8,alignItems:'center'}}>
                <span className={`badge ${pctQ(d)>50?'bg':'by'}`}>{fmtP(pctQ(d))} quitado</span>
                <button onClick={()=>setDebts(debts.filter(x=>x.id!==d.id))} style={{background:'none',border:'none',cursor:'pointer',padding:4,color:'var(--muted)'}}><IC n="x" s={15} c="var(--muted)"/></button>
              </div>
            </div>
            <div className="dc-grid">
              <div><div className="dc-stat-lbl">Valor Total</div><div className="dc-stat-val">{fmt(d.valorTotal)}</div></div>
              <div><div className="dc-stat-lbl">Saldo Devedor</div><div className="dc-stat-val cr">{fmt(saldD(d))}</div></div>
              <div><div className="dc-stat-lbl">Parcela Mensal</div><div className="dc-stat-val">{fmt(d.parcela)}</div></div>
              <div><div className="dc-stat-lbl">Parcelas Restantes</div><div className="dc-stat-val">{rest(d)}x de {d.qtd}</div></div>
              <div><div className="dc-stat-lbl">Previsão Quitação</div><div className="dc-stat-val" style={{fontSize:13}}>~{rest(d)} meses</div></div>
            </div>
            <div className="pb" style={{marginTop:14,height:6}}><div className="pf" style={{width:`${pctQ(d)}%`,background:pctQ(d)>60?'var(--accent2)':'var(--warn)'}}/></div>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:11,color:'var(--muted)',marginTop:4}}><span>{d.pagas} pagas</span><span>{rest(d)} restantes</span></div>
          </div>
        ))}
        <div className="card" style={{marginTop:4}}>
          <div className="card-title">Projeção de Parcelas — Próximos {Math.min(maxM,24)} Meses</div>
          <ResponsiveContainer width="100%" height={190}>
            <AreaChart data={projChart} margin={{top:10,right:10,left:0,bottom:0}}>
              <defs><linearGradient id="gD" x1="0" y1="0" x2="0" y2="1"><stop offset="5%" stopColor="#ff4d6d" stopOpacity={.3}/><stop offset="95%" stopColor="#ff4d6d" stopOpacity={0}/></linearGradient></defs>
              <CartesianGrid strokeDasharray="3 3" stroke="#222638" vertical={false}/>
              <XAxis dataKey="mes" tick={{fill:'#5e6785',fontSize:10}} axisLine={false} tickLine={false}/>
              <YAxis tick={{fill:'#5e6785',fontSize:10}} axisLine={false} tickLine={false} tickFormatter={v=>`${(v/1000).toFixed(0)}k`}/>
              <Tooltip content={<TT/>}/>
              <ReferenceLine y={FAT*0.15} stroke="#ffb020" strokeDasharray="4 4" label={{value:'Limite 15%',fill:'#ffb020',fontSize:10,position:'insideTopRight'}}/>
              <Area type="monotone" dataKey="total" name="Total Parcelas" fill="url(#gD)" stroke="#ff4d6d" strokeWidth={2}/>
            </AreaChart>
          </ResponsiveContainer>
          <div style={{marginTop:12,padding:'10px 14px',background:'var(--surface)',borderRadius:9,fontSize:12.5,color:'var(--muted)'}}>
            Comprometimento atual: <strong style={{color:pct>15?'var(--danger)':'var(--accent2)'}}>{fmtP(pct)}</strong> do faturamento mensal. Limite recomendado: 15%.
          </div>
        </div>
      </div>
      {modal && <div className="overlay" onClick={e=>e.target===e.currentTarget&&setModal(false)}>
        <div className="modal">
          <div className="modal-t">Lançar Nova Dívida</div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:13,marginBottom:18}}>
            {fields.map(f=>(
              <div key={f.k} className="fg" style={f.full?{gridColumn:'1/-1'}:{}}>
                <label className="fl">{f.label}</label>
                <input className="fi" type={f.type} placeholder={f.ph} value={form[f.k]} onChange={e=>setForm({...form,[f.k]:e.target.value})}/>
              </div>
            ))}
          </div>
          <div style={{display:'flex',gap:10,justifyContent:'flex-end'}}>
            <button className="btn btn-g" onClick={()=>setModal(false)}>Cancelar</button>
            <button className="btn btn-p" onClick={add}><IC n="ok" s={14} c="#fff"/> Lançar Dívida</button>
          </div>
        </div>
      </div>}
    </div>
  );
}

// ── APP PRINCIPAL ─────────────────────────────────────────────────────────────
function App() {
  const [user, setUser] = useState(null);
  const [tab, setTab]   = useState('dashboard');

  useEffect(() => {
    // Esconde o loading e cancela o timeout de erro
    var ld = document.getElementById('loading');
    if (ld) ld.style.display = 'none';
    clearTimeout(window.__fcTimeout);
    // Restaura sessão anterior
    const saved = sessionStorage.getItem('fc_user');
    if (saved) try { setUser(JSON.parse(saved)); } catch(e) {}
  }, []);

  const login = (u) => {
    sessionStorage.setItem('fc_user', JSON.stringify(u));
    setUser(u);
  };
  const logout = () => {
    sessionStorage.removeItem('fc_user');
    setUser(null);
    setTab('dashboard');
  };

  if (!user) return <Login onLogin={login}/>;

  const nav = [
    {id:'dashboard',label:'Painel Inicial', icon:'home'},
    {id:'cashflow', label:'Fluxo de Caixa', icon:'flow'},
    {id:'results',  label:'Resultados',      icon:'bar'},
    {id:'debt',     label:'Endividamento',   icon:'credit'},
  ];

  return (
    <div className="app">
      <div className="sidebar">
        <div className="sb-logo">
          <div className="logo-name">FinControl</div>
          <div className="logo-sub">Gestão Financeira</div>
        </div>
        <nav className="sb-nav">
          <div className="nav-label">Menu</div>
          {nav.map(item=>(
            <div key={item.id} className={`nav-item${tab===item.id?' active':''}`} onClick={()=>setTab(item.id)}>
              <IC n={item.icon} s={16}/>{item.label}
            </div>
          ))}
        </nav>
        <div className="sb-foot">
          <div style={{display:'flex',alignItems:'center',gap:10,flex:1,overflow:'hidden'}}>
            <div className="avatar">{user.nome[0]}</div>
            <div style={{overflow:'hidden'}}>
              <div style={{fontSize:12.5,fontWeight:600,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{user.nome}</div>
              <div style={{fontSize:10.5,color:'var(--muted)',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{user.empresa}</div>
            </div>
          </div>
          <button className="logout-btn" onClick={logout} title="Sair"><IC n="logout" s={16} c="currentColor"/></button>
        </div>
      </div>
      <div className="main">
        {tab==='dashboard' && <Dashboard/>}
        {tab==='cashflow'  && <CashFlow/>}
        {tab==='results'   && <Resultados/>}
        {tab==='debt'      && <Endividamento/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
