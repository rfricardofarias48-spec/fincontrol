<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FinControl — Gestão Financeira</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    :root {
      --bg: #0a0c14;
      --surface: #111420;
      --card: #181c2a;
      --border: #222638;
      --accent: #3d7bff;
      --accent2: #00e5a0;
      --danger: #ff4d6d;
      --warn: #ffb020;
      --purple: #c084fc;
      --text: #e4e8f4;
      --muted: #5e6785;
      --fd: 'Syne', sans-serif;
      --fb: 'DM Sans', sans-serif;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:var(--bg); color:var(--text); font-family:var(--fb); font-size:14px; line-height:1.6; min-height:100vh; }
    .app { display:flex; min-height:100vh; }

    /* SIDEBAR */
    .sidebar { width:232px; background:var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; position:fixed; top:0; left:0; height:100vh; z-index:100; }
    .sb-logo { padding:26px 22px 18px; border-bottom:1px solid var(--border); }
    .logo-name { font-family:var(--fd); font-size:21px; font-weight:800; letter-spacing:-0.5px; background:linear-gradient(135deg,var(--accent),var(--accent2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .logo-sub { font-size:10px; color:var(--muted); letter-spacing:1px; text-transform:uppercase; margin-top:2px; }
    .sb-nav { flex:1; padding:14px 10px; display:flex; flex-direction:column; gap:2px; }
    .nav-label { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:1.2px; color:var(--muted); padding:10px 12px 4px; }
    .nav-item { display:flex; align-items:center; gap:11px; padding:10px 13px; border-radius:9px; cursor:pointer; color:var(--muted); font-size:13.5px; font-weight:500; transition:all .15s; border:1px solid transparent; }
    .nav-item:hover { background:var(--card); color:var(--text); }
    .nav-item.active { background:rgba(61,123,255,.12); color:var(--accent); border-color:rgba(61,123,255,.2); }
    .sb-foot { padding:14px 20px; border-top:1px solid var(--border); display:flex; align-items:center; gap:10px; }
    .avatar { width:32px; height:32px; border-radius:50%; background:linear-gradient(135deg,var(--accent),var(--accent2)); display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:700; color:#fff; flex-shrink:0; }

    /* MAIN */
    .main { flex:1; margin-left:232px; min-height:100vh; }
    .ph { padding:30px 34px 0; margin-bottom:24px; }
    .ph-row { display:flex; align-items:flex-start; justify-content:space-between; }
    .pt { font-family:var(--fd); font-size:25px; font-weight:700; letter-spacing:-.5px; }
    .ps { color:var(--muted); font-size:13px; margin-top:3px; }
    .pc { padding:0 34px 34px; }

    /* CARDS */
    .card { background:var(--card); border:1px solid var(--border); border-radius:13px; padding:18px 20px; }
    .card-title { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.9px; color:var(--muted); margin-bottom:14px; }

    /* KPI */
    .kpi-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:20px; }
    .kpi { background:var(--card); border:1px solid var(--border); border-radius:13px; padding:18px 20px; position:relative; overflow:hidden; }
    .kpi::after { content:''; position:absolute; top:0; left:0; right:0; height:2px; }
    .kpi.b::after { background:linear-gradient(90deg,var(--accent),transparent); }
    .kpi.g::after { background:linear-gradient(90deg,var(--accent2),transparent); }
    .kpi.r::after { background:linear-gradient(90deg,var(--danger),transparent); }
    .kpi.y::after { background:linear-gradient(90deg,var(--warn),transparent); }
    .kpi.p::after { background:linear-gradient(90deg,var(--purple),transparent); }
    .kpi-lbl { font-size:10.5px; font-weight:700; text-transform:uppercase; letter-spacing:.8px; color:var(--muted); margin-bottom:9px; }
    .kpi-val { font-family:var(--fd); font-size:24px; font-weight:700; letter-spacing:-.5px; line-height:1; margin-bottom:9px; }
    .kpi-delta { font-size:11.5px; display:flex; align-items:center; gap:4px; }
    .up { color:var(--accent2); }
    .dn { color:var(--danger); }

    /* PERIOD SELECTOR */
    .psel { display:flex; gap:3px; background:var(--surface); border:1px solid var(--border); border-radius:9px; padding:3px; }
    .pbtn { padding:6px 14px; border-radius:7px; font-size:12.5px; font-weight:500; cursor:pointer; color:var(--muted); border:none; background:none; font-family:var(--fb); transition:all .15s; }
    .pbtn.active { background:var(--card); color:var(--text); border:1px solid var(--border); }

    /* TABLE */
    .tw { overflow-x:auto; border-radius:13px; border:1px solid var(--border); }
    table { width:100%; border-collapse:collapse; }
    thead th { background:var(--surface); padding:11px 15px; text-align:left; font-size:10.5px; font-weight:700; text-transform:uppercase; letter-spacing:.7px; color:var(--muted); border-bottom:1px solid var(--border); }
    tbody td { padding:12px 15px; border-bottom:1px solid rgba(34,38,56,.5); font-size:13px; }
    tbody tr:last-child td { border-bottom:none; }
    tbody tr:hover td { background:rgba(255,255,255,.015); }

    /* BADGE */
    .badge { display:inline-flex; align-items:center; padding:3px 9px; border-radius:20px; font-size:11px; font-weight:600; }
    .bb { background:rgba(61,123,255,.14); color:#6fa0ff; }
    .bg { background:rgba(0,229,160,.12); color:#00e5a0; }
    .br { background:rgba(255,77,109,.12); color:#ff4d6d; }
    .by { background:rgba(255,176,32,.12); color:#ffb020; }
    .bp { background:rgba(192,132,252,.12); color:#c084fc; }

    /* SUB TABS */
    .stabs { display:flex; border-bottom:1px solid var(--border); margin-bottom:22px; }
    .stab { padding:10px 18px; font-size:13px; font-weight:500; cursor:pointer; color:var(--muted); border-bottom:2px solid transparent; transition:all .15s; margin-bottom:-1px; }
    .stab.active { color:var(--accent); border-bottom-color:var(--accent); }

    /* BUTTON */
    .btn { display:inline-flex; align-items:center; gap:7px; padding:8px 16px; border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; border:none; font-family:var(--fb); transition:all .15s; }
    .btn-p { background:var(--accent); color:#fff; }
    .btn-p:hover { background:#2d6bef; }
    .btn-g { background:transparent; color:var(--muted); border:1px solid var(--border); }
    .btn-g:hover { background:var(--card); color:var(--text); }

    /* FORM */
    .fg { display:flex; flex-direction:column; gap:5px; }
    .fl { font-size:10.5px; font-weight:700; text-transform:uppercase; letter-spacing:.7px; color:var(--muted); }
    .fi { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:9px 13px; color:var(--text); font-size:13px; font-family:var(--fb); width:100%; transition:border-color .15s; }
    .fi:focus { outline:none; border-color:var(--accent); }

    /* DEBT CARD */
    .dc { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:18px 20px; margin-bottom:12px; }
    .dc-head { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:16px; }
    .dc-name { font-family:var(--fd); font-size:15px; font-weight:600; }
    .dc-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:12px; }
    .dc-stat-lbl { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.6px; color:var(--muted); margin-bottom:3px; }
    .dc-stat-val { font-size:14px; font-weight:700; }
    .pb { height:5px; background:var(--surface); border-radius:5px; overflow:hidden; margin-top:12px; }
    .pf { height:100%; border-radius:5px; transition:width .5s ease; }

    /* DRE */
    .dre-sec { padding:8px 0; border-bottom:1px solid var(--border); }
    .dre-sec-t { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:1px; color:var(--muted); padding:6px 0 2px; }
    .dre-row { display:flex; justify-content:space-between; padding:6px 0 6px 14px; font-size:13px; border-bottom:1px solid rgba(34,38,56,.4); }
    .dre-row:last-child { border-bottom:none; }
    .dre-tot { display:flex; justify-content:space-between; padding:10px 0; font-family:var(--fd); font-size:14.5px; font-weight:700; }

    /* SUMMARY GRID */
    .sg { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin-bottom:20px; }
    .sc { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:16px 18px; }
    .sc-lbl { font-size:10.5px; font-weight:700; text-transform:uppercase; letter-spacing:.7px; color:var(--muted); margin-bottom:7px; }
    .sc-val { font-family:var(--fd); font-size:21px; font-weight:700; }

    /* MODAL */
    .overlay { position:fixed; inset:0; background:rgba(0,0,0,.65); display:flex; align-items:center; justify-content:center; z-index:200; backdrop-filter:blur(5px); }
    .modal { background:var(--surface); border:1px solid var(--border); border-radius:15px; padding:26px; width:580px; max-width:95vw; max-height:90vh; overflow-y:auto; }
    .modal-t { font-family:var(--fd); font-size:18px; font-weight:700; margin-bottom:18px; }

    /* TOOLTIP */
    .tt { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:10px 13px; font-size:12px; }
    .tt-lbl { font-family:var(--fd); font-weight:600; margin-bottom:5px; }
    .tt-row { display:flex; align-items:center; gap:7px; color:var(--muted); margin-top:2px; }
    .tt-dot { width:7px; height:7px; border-radius:50%; }

    /* COLORS */
    .cg { color:var(--accent2); }
    .cr { color:var(--danger); }
    .cb { color:var(--accent); }
    .cy { color:var(--warn); }
    .cp { color:var(--purple); }
    .cm { color:var(--muted); }

    ::-webkit-scrollbar { width:5px; height:5px; }
    ::-webkit-scrollbar-track { background:transparent; }
    ::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo } = React;
const { AreaChart, Area, LineChart, Line, BarChart, Bar, ComposedChart,
        XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer,
        ReferenceLine, PieChart, Pie, Cell, Legend } = Recharts;

// ── DATA ──────────────────────────────────────────────────────────────────────
const MF = [
  { mes:'Jan', fat:142000, custos:78000, despOp:28400, impostos:9230, lucro:26370 },
  { mes:'Fev', fat:138000, custos:75900, despOp:27600, impostos:8970, lucro:25530 },
  { mes:'Mar', fat:155000, custos:85250, despOp:31000, impostos:10075, lucro:28675 },
  { mes:'Abr', fat:148000, custos:81400, despOp:29600, impostos:9620, lucro:27380 },
  { mes:'Mai', fat:162000, custos:89100, despOp:32400, impostos:10530, lucro:29970 },
  { mes:'Jun', fat:158000, custos:86900, despOp:31600, impostos:10270, lucro:29230 },
  { mes:'Jul', fat:145000, custos:79750, despOp:29000, impostos:9425, lucro:26825 },
  { mes:'Ago', fat:167000, custos:91850, despOp:33400, impostos:10855, lucro:30895 },
  { mes:'Set', fat:171000, custos:94050, despOp:34200, impostos:11115, lucro:31635 },
  { mes:'Out', fat:159000, custos:87450, despOp:31800, impostos:10335, lucro:29415 },
  { mes:'Nov', fat:178000, custos:97900, despOp:35600, impostos:11570, lucro:32930 },
  { mes:'Dez', fat:195000, custos:107250, despOp:39000, impostos:12675, lucro:36075 },
].map(d => ({
  ...d,
  margem: +((d.lucro/d.fat)*100).toFixed(1),
  rent: +((d.lucro/(d.custos+d.despOp))*100).toFixed(1),
}));

const ENTRADAS = [
  { id:1, data:'2025-05-02', desc:'Pagamento — Projeto Alpha',      cat:'Serviços',     valor:45000, st:'Recebido' },
  { id:2, data:'2025-05-05', desc:'Mensalidade — Cliente Beta',     cat:'Mensalidade',  valor:18000, st:'Recebido' },
  { id:3, data:'2025-05-08', desc:'Consultoria — Empresa Gama',     cat:'Consultoria',  valor:12500, st:'Recebido' },
  { id:4, data:'2025-05-12', desc:'Projeto Delta — Parcela 2/3',    cat:'Serviços',     valor:22000, st:'Recebido' },
  { id:5, data:'2025-05-15', desc:'Licença Software Anual',         cat:'Licença',      valor:8500,  st:'Recebido' },
  { id:6, data:'2025-05-18', desc:'Contrato Omega — Início',        cat:'Serviços',     valor:35000, st:'Previsto' },
  { id:7, data:'2025-05-22', desc:'Mensalidade — Cliente Epsilon',  cat:'Mensalidade',  valor:9800,  st:'Previsto' },
  { id:8, data:'2025-05-28', desc:'Bônus por Indicação',            cat:'Outros',       valor:3500,  st:'Previsto' },
];

const SAIDAS = [
  { id:1,  data:'2025-05-01', desc:'Folha de Pagamento',            cat:'Pessoal',       valor:58000, st:'Pago' },
  { id:2,  data:'2025-05-05', desc:'Aluguel Escritório',            cat:'Infraestrutura',valor:8500,  st:'Pago' },
  { id:3,  data:'2025-05-07', desc:'AWS — Cloud Services',          cat:'Tecnologia',    valor:4200,  st:'Pago' },
  { id:4,  data:'2025-05-10', desc:'Impostos (DAS + IRPJ)',         cat:'Impostos',      valor:16500, st:'Pago' },
  { id:5,  data:'2025-05-12', desc:'Marketing Digital',             cat:'Marketing',     valor:6800,  st:'Pago' },
  { id:6,  data:'2025-05-15', desc:'Parcela Empréstimo Banco X',    cat:'Dívidas',       valor:3850,  st:'Pago' },
  { id:7,  data:'2025-05-18', desc:'Softwares e Licenças',          cat:'Tecnologia',    valor:2300,  st:'Previsto' },
  { id:8,  data:'2025-05-20', desc:'Energia + Internet',            cat:'Infraestrutura',valor:1800,  st:'Previsto' },
  { id:9,  data:'2025-05-25', desc:'Parcela Leasing Veículo',       cat:'Dívidas',       valor:2100,  st:'Previsto' },
  { id:10, data:'2025-05-30', desc:'Contabilidade + Jurídico',      cat:'Serv. Prof.',   valor:3500,  st:'Previsto' },
];

const DEBTS0 = [
  { id:1, nome:'Empréstimo Banco X',      valorTotal:120000, parcela:3850, qtd:36, pagas:8,  juros:1.8, inicio:'Out/2024' },
  { id:2, nome:'Leasing Veículo Empresa', valorTotal:75600,  parcela:2100, qtd:36, pagas:12, juros:1.2, inicio:'Abr/2024' },
  { id:3, nome:'FINAME — Equipamento',    valorTotal:48000,  parcela:1600, qtd:30, pagas:18, juros:0.9, inicio:'Nov/2023' },
];

// ── HELPERS ───────────────────────────────────────────────────────────────────
const fmt  = v => v == null ? '—' : v.toLocaleString('pt-BR',{style:'currency',currency:'BRL',maximumFractionDigits:0});
const fmtP = v => `${(+v).toFixed(1)}%`;
const fmtD = d => { const [y,m,day]=d.split('-'); return `${day}/${m}/${y.slice(2)}`; };

const catBadge = c => ({ Serviços:'bb', Mensalidade:'bg', Consultoria:'bp', Licença:'by',
  Outros:'by', Pessoal:'br', Infraestrutura:'bb', Tecnologia:'bp',
  Impostos:'br', Marketing:'by', 'Dívidas':'br', 'Serv. Prof.':'bb' }[c] || 'bb');
const stBadge  = s => (s==='Recebido'||s==='Pago') ? 'bg' : 'by';

// ── ICONS ─────────────────────────────────────────────────────────────────────
const IC = ({ n, s=18, c='currentColor' }) => {
  const d = {
    home:    <><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></>,
    flow:    <><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></>,
    bar:     <><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></>,
    credit:  <><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></>,
    plus:    <><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></>,
    aup:     <><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></>,
    adn:     <><line x1="12" y1="5" x2="12" y2="19"/><polyline points="19 12 12 19 5 12"/></>,
    warn:    <><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></>,
    ok:      <><polyline points="20 6 9 17 4 12"/></>,
    x:       <><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></>,
  };
  return <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">{d[n]}</svg>;
};

// ── TOOLTIPS ──────────────────────────────────────────────────────────────────
const TT = ({ active, payload, label }) => {
  if (!active||!payload?.length) return null;
  return (
    <div className="tt">
      <div className="tt-lbl">{label}</div>
      {payload.map((p,i) => (
        <div key={i} className="tt-row">
          <div className="tt-dot" style={{background:p.color}}/>
          <span>{p.name}: <strong style={{color:p.color}}>{fmt(p.value)}</strong></span>
        </div>
      ))}
    </div>
  );
};

const TTP = ({ active, payload, label }) => {
  if (!active||!payload?.length) return null;
  return (
    <div className="tt">
      <div className="tt-lbl">{label}</div>
      {payload.map((p,i) => (
        <div key={i} className="tt-row">
          <div className="tt-dot" style={{background:p.color}}/>
          <span>{p.name}: <strong style={{color:p.color}}>{fmtP(p.value)}</strong></span>
        </div>
      ))}
    </div>
  );
};

// ── DASHBOARD ────────────────────────────────────────────────────────────────
function Dashboard() {
  const [period, setPeriod] = useState('Anual');
  const periods = ['Quinzenal','Mensal','Trimestral','Anual'];

  const slice = useMemo(() => ({
    Anual: MF, Trimestral: MF.slice(9), Mensal: MF.slice(11), Quinzenal: MF.slice(10),
  }[period]), [period]);

  const T = useMemo(() => {
    const fat=slice.reduce((s,d)=>s+d.fat,0);
    const lucro=slice.reduce((s,d)=>s+d.lucro,0);
    const custos=slice.reduce((s,d)=>s+d.custos,0);
    const despOp=slice.reduce((s,d)=>s+d.despOp,0);
    return { fat, lucro, margem:(lucro/fat)*100, rent:(lucro/(custos+despOp))*100 };
  }, [slice]);

  const chartData = period==='Anual'?MF:period==='Trimestral'?MF.slice(9):period==='Mensal'?MF.slice(10):MF.slice(10);

  const pie = [
    { name:'Custos Diretos', value: MF[11].custos },
    { name:'Desp. Operac.',  value: MF[11].despOp },
    { name:'Impostos',       value: MF[11].impostos },
  ];
  const pieColors = ['#3d7bff','#ffb020','#ff4d6d'];

  return (
    <div>
      <div className="ph">
        <div className="ph-row">
          <div><div className="pt">Painel Inicial</div><div className="ps">Visão geral do desempenho financeiro</div></div>
          <div className="psel">{periods.map(p=><button key={p} className={`pbtn${period===p?' active':''}`} onClick={()=>setPeriod(p)}>{p}</button>)}</div>
        </div>
      </div>
      <div className="pc">
        <div className="kpi-grid">
          <div className="kpi b"><div className="kpi-lbl">Faturamento</div><div className="kpi-val">{fmt(T.fat)}</div><div className="kpi-delta up"><IC n="aup" s={13} c="var(--accent2)"/>+12.4% vs período ant.</div></div>
          <div className="kpi g"><div className="kpi-lbl">Lucro Líquido</div><div className="kpi-val cg">{fmt(T.lucro)}</div><div className="kpi-delta up"><IC n="aup" s={13} c="var(--accent2)"/>+8.7% vs período ant.</div></div>
          <div className="kpi y"><div className="kpi-lbl">Margem Líquida</div><div className="kpi-val">{fmtP(T.margem)}</div><div className="kpi-delta dn"><IC n="adn" s={13} c="var(--danger)"/>-1.2pp vs período ant.</div></div>
          <div className="kpi r"><div className="kpi-lbl">Rentabilidade</div><div className="kpi-val">{fmtP(T.rent)}</div><div className="kpi-delta up"><IC n="aup" s={13} c="var(--accent2)"/>+3.1pp vs período ant.</div></div>
        </div>

        <div className="card" style={{marginBottom:18}}>
          <div className="card-title">Faturamento × Lucro Líquido</div>
          <ResponsiveContainer width="100%" height={230}>
            <ComposedChart data={chartData} margin={{top:8,right:8,left:0,bottom:0}}>

// ── ENDIVIDAMENTO ─────────────────────────────────────────────────────────────
function Endividamento() {
  const [debts, setDebts] = useState(DEBTS0);
  const [modal, setModal] = useState(false);
  const [form, setForm] = useState({nome:'',valorTotal:'',parcela:'',qtd:'',pagas:'',juros:'',inicio:''});

  const FAT_MES = 167000;
  const totParcelas = debts.reduce((s,d)=>s+d.parcela,0);
  const totDevedor  = debts.reduce((s,d)=>s+Math.max(0,d.valorTotal-d.pagas*d.parcela),0);
  const pctFat      = (totParcelas/FAT_MES)*100;

  const restante = d => d.qtd - d.pagas;
  const saldoDev = d => Math.max(0, d.valorTotal - d.pagas * d.parcela);
  const pctQuit  = d => Math.min(100, (d.pagas/d.qtd)*100);

  const addDebt = () => {
    if (!form.nome||!form.valorTotal) return;
    setDebts([...debts,{id:Date.now(),nome:form.nome,valorTotal:+form.valorTotal,parcela:+form.parcela,qtd:+form.qtd,pagas:+form.pagas||0,juros:+form.juros||0,inicio:form.inicio}]);
    setForm({nome:'',valorTotal:'',parcela:'',qtd:'',pagas:'',juros:'',inicio:''});
    setModal(false);
  };

  const maxMeses = Math.max(...debts.map(d=>restante(d)));
  const projChart = Array.from({length:Math.min(maxMeses,24)},(_,i)=>({
    mes:`M${i+1}`,
    total: debts.reduce((s,d)=> i < restante(d) ? s+d.parcela : s, 0),
  }));

  const fields = [
    {k:'nome',     label:'Nome da Dívida',        type:'text',   ph:'Empréstimo Banco X'},
    {k:'valorTotal',label:'Valor Total (R$)',      type:'number', ph:'120000'},
    {k:'parcela',  label:'Valor da Parcela (R$)',  type:'number', ph:'3850'},
    {k:'qtd',      label:'Qtd. de Parcelas',       type:'number', ph:'36'},
    {k:'pagas',    label:'Parcelas Já Pagas',       type:'number', ph:'0'},
    {k:'juros',    label:'Juros (% a.m.)',          type:'number', ph:'1.5'},
    {k:'inicio',   label:'Data de Início',          type:'text',   ph:'Jan/2025'},
  ];

  return (
    <div>
      <div className="ph">
        <div className="ph-row">
          <div><div className="pt">Endividamento</div><div className="ps">Gestão de dívidas e comprometimento de receita</div></div>
          <button className="btn btn-p" onClick={()=>setModal(true)}><IC n="plus" s={15} c="#fff"/> Nova Dívida</button>
        </div>
      </div>
      <div className="pc">
        <div className="kpi-grid">
          <div className="kpi r"><div className="kpi-lbl">Saldo Devedor Total</div><div className="kpi-val cr">{fmt(totDevedor)}</div></div>
          <div className="kpi y"><div className="kpi-lbl">Parcelas / Mês</div><div className="kpi-val">{fmt(totParcelas)}</div></div>
          <div className={`kpi ${pctFat>15?'r':'g'}`}>
            <div className="kpi-lbl">% do Faturamento</div>
            <div className={`kpi-val ${pctFat>15?'cr':'cg'}`}>{fmtP(pctFat)}</div>
            <div style={{fontSize:11,color:'var(--muted)',marginTop:5}}>{pctFat>15?'⚠ Nível elevado':'✓ Nível saudável'}</div>
          </div>
          <div className="kpi b"><div className="kpi-lbl">Dívidas Ativas</div><div className="kpi-val">{debts.length}</div></div>
        </div>

        {debts.map(d=>(
          <div key={d.id} className="dc">
            <div className="dc-head">
              <div>
                <div className="dc-name">{d.nome}</div>
                <div style={{fontSize:11.5,color:'var(--muted)',marginTop:2}}>Início: {d.inicio} · Juros: {fmtP(d.juros)} a.m.</div>
              </div>
              <div style={{display:'flex',gap:8,alignItems:'center'}}>
                <span className={`badge ${pctQuit(d)>50?'bg':'by'}`}>{fmtP(pctQuit(d))} quitado</span>
                <button onClick={()=>setDebts(debts.filter(x=>x.id!==d.id))} style={{background:'none',border:'none',cursor:'pointer',padding:4,color:'var(--muted)'}}>
                  <IC n="x" s={15} c="var(--muted)"/>
                </button>
              </div>
            </div>
            <div className="dc-grid">
              <div><div className="dc-stat-lbl">Valor Total</div><div className="dc-stat-val">{fmt(d.valorTotal)}</div></div>
              <div><div className="dc-stat-lbl">Saldo Devedor</div><div className="dc-stat-val cr">{fmt(saldoDev(d))}</div></div>
              <div><div className="dc-stat-lbl">Parcela Mensal</div><div className="dc-stat-val">{fmt(d.parcela)}</div></div>
              <div><div className="dc-stat-lbl">Parcelas Restantes</div><div className="dc-stat-val">{restante(d)}x de {d.qtd}</div></div>
              <div><div className="dc-stat-lbl">Previsão de Quitação</div><div className="dc-stat-val" style={{fontSize:13}}>em ~{restante(d)} meses</div></div>
            </div>
            <div className="pb" style={{marginTop:14,height:6}}>
              <div className="pf" style={{width:`${pctQuit(d)}%`,background:pctQuit(d)>60?'var(--accent2)':'var(--warn)'}}/>
            </div>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:11,color:'var(--muted)',marginTop:4}}>
              <span>{d.pagas} pagas</span><span>{restante(d)} restantes</span>
            </div>
          </div>
        ))}

        <div className="card" style={{marginTop:4}}>
          <div className="card-title">Projeção de Parcelas — Próximos {Math.min(maxMeses,24)} Meses</div>
          <ResponsiveContainer width="100%" height={195}>
            <AreaChart data={projChart} margin={{top:10,right:10,left:0,bottom:0}}>
              <defs>
                <linearGradient id="gD" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="5%" stopColor="#ff4d6d" stopOpacity={.3}/>
                  <stop offset="95%" stopColor="#ff4d6d" stopOpacity={0}/>
                </linearGradient>
              </defs>
              <CartesianGrid strokeDasharray="3 3" stroke="#222638" vertical={false}/>
              <XAxis dataKey="mes" tick={{fill:'#5e6785',fontSize:10}} axisLine={false} tickLine={false}/>
              <YAxis tick={{fill:'#5e6785',fontSize:10}} axisLine={false} tickLine={false} tickFormatter={v=>`${(v/1000).toFixed(0)}k`}/>
              <Tooltip content={<TT/>}/>
              <ReferenceLine y={FAT_MES*0.15} stroke="#ffb020" strokeDasharray="4 4" label={{value:'Limite 15% fat.',fill:'#ffb020',fontSize:10,position:'insideTopRight'}}/>
              <Area type="monotone" dataKey="total" name="Total de Parcelas" fill="url(#gD)" stroke="#ff4d6d" strokeWidth={2}/>
            </AreaChart>
          </ResponsiveContainer>
          <div style={{marginTop:12,padding:'10px 14px',background:'var(--surface)',borderRadius:9,fontSize:12.5,color:'var(--muted)'}}>
            A linha pontilhada representa 15% do faturamento mensal — limite recomendado de comprometimento com dívidas. Atualmente em <strong style={{color:pctFat>15?'var(--danger)':'var(--accent2)'}}>{fmtP(pctFat)}</strong>.
          </div>
        </div>
      </div>

      {modal && (
        <div className="overlay" onClick={e=>e.target===e.currentTarget&&setModal(false)}>
          <div className="modal">
            <div className="modal-t">Lançar Nova Dívida</div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14,marginBottom:18}}>
              {fields.map(f=>(
                <div key={f.k} className="fg" style={f.k==='nome'?{gridColumn:'1/-1'}:{}}>
                  <label className="fl">{f.label}</label>
                  <input className="fi" type={f.type} placeholder={f.ph} value={form[f.k]} onChange={e=>setForm({...form,[f.k]:e.target.value})}/>
                </div>
              ))}
            </div>
            <div style={{display:'flex',gap:10,justifyContent:'flex-end'}}>
              <button className="btn btn-g" onClick={()=>setModal(false)}>Cancelar</button>
              <button className="btn btn-p" onClick={addDebt}><IC n="ok" s={14} c="#fff"/> Lançar Dívida</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── APP ───────────────────────────────────────────────────────────────────────
function App() {
  const [tab, setTab] = useState('dashboard');
  const nav = [
    {id:'dashboard', label:'Painel Inicial',  icon:'home'},
    {id:'cashflow',  label:'Fluxo de Caixa',  icon:'flow'},
    {id:'results',   label:'Resultados',       icon:'bar'},
    {id:'debt',      label:'Endividamento',    icon:'credit'},
  ];
  return (
    <div className="app">
      <div className="sidebar">
        <div className="sb-logo">
          <div className="logo-name">FinControl</div>
          <div className="logo-sub">Gestão Financeira</div>
        </div>
        <nav className="sb-nav">
          <div className="nav-label">Menu</div>
          {nav.map(item=>(
            <div key={item.id} className={`nav-item${tab===item.id?' active':''}`} onClick={()=>setTab(item.id)}>
              <IC n={item.icon} s={16}/>{item.label}
            </div>
          ))}
        </nav>
        <div className="sb-foot">
          <div className="avatar">E</div>
          <div>
            <div style={{fontSize:12.5,fontWeight:600}}>Empresa Exemplo</div>
            <div style={{fontSize:11,color:'var(--muted)'}}>CNPJ 00.000.000/0001-00</div>
          </div>
        </div>
      </div>
      <div className="main">
        {tab==='dashboard' && <Dashboard/>}
        {tab==='cashflow'  && <CashFlow/>}
        {tab==='results'   && <Resultados/>}
        {tab==='debt'      && <Endividamento/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
