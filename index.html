<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FinControl</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0c14;--surf:#111420;--card:#181c2a;--bdr:#222638;--acc:#3d7bff;--acc2:#00e5a0;--dan:#ff4d6d;--wrn:#ffb020;--pur:#c084fc;--txt:#e4e8f4;--mut:#5e6785;}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{background:var(--bg);color:var(--txt);font-family:'Inter',sans-serif;font-size:14px;line-height:1.6;min-height:100vh;}
/* SIDEBAR */
.app{display:flex;min-height:100vh;}
.sb{width:228px;background:var(--surf);border-right:1px solid var(--bdr);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:100;}
.sb-logo{padding:22px 20px 16px;border-bottom:1px solid var(--bdr);}
.logo-n{font-family:'Inter',sans-serif;font-size:20px;font-weight:800;background:linear-gradient(135deg,var(--acc),var(--acc2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.logo-s{font-size:10px;color:var(--mut);letter-spacing:1px;text-transform:uppercase;margin-top:1px;}
.sb-nav{flex:1;padding:12px 10px;display:flex;flex-direction:column;gap:2px;}
.nav-grp{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--mut);padding:8px 12px 3px;}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 13px;border-radius:9px;cursor:pointer;color:var(--mut);font-size:13px;font-weight:500;border:1px solid transparent;transition:all .15s;user-select:none;}
.nav-item:hover{background:var(--card);color:var(--txt);}
.nav-item.active{background:rgba(61,123,255,.12);color:var(--acc);border-color:rgba(61,123,255,.2);}
.sb-foot{padding:12px 18px;border-top:1px solid var(--bdr);display:flex;align-items:center;gap:10px;justify-content:space-between;}
.av{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--acc),var(--acc2));display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0;}
.logout-btn{background:none;border:none;cursor:pointer;color:var(--mut);display:flex;padding:4px;border-radius:6px;}
.logout-btn:hover{color:var(--dan);}
/* MAIN */
.main{flex:1;margin-left:228px;min-height:100vh;}
.ph{padding:26px 32px 0;margin-bottom:20px;}
.ph-row{display:flex;align-items:flex-start;justify-content:space-between;}
.pt{font-family:'Inter',sans-serif;font-size:24px;font-weight:700;letter-spacing:-.5px;}
.ps{color:var(--mut);font-size:13px;margin-top:3px;}
.pc{padding:0 32px 32px;}
/* CARDS */
.card{background:var(--card);border:1px solid var(--bdr);border-radius:13px;padding:18px 20px;}
.ctitle{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.9px;color:var(--mut);margin-bottom:14px;}
/* KPI */
.kpi-g{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px;}
.kpi{background:var(--card);border:1px solid var(--bdr);border-radius:13px;padding:18px 20px;position:relative;overflow:hidden;}
.kpi::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.kpi.b::after{background:linear-gradient(90deg,var(--acc),transparent);}
.kpi.g::after{background:linear-gradient(90deg,var(--acc2),transparent);}
.kpi.r::after{background:linear-gradient(90deg,var(--dan),transparent);}
.kpi.y::after{background:linear-gradient(90deg,var(--wrn),transparent);}
.kpi-l{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--mut);margin-bottom:8px;}
.kpi-v{font-family:'Inter',sans-serif;font-size:22px;font-weight:700;letter-spacing:-.5px;margin-bottom:8px;}
.kpi-d{font-size:11px;display:flex;align-items:center;gap:3px;}
/* PERIOD */
.psel{display:flex;gap:3px;background:var(--surf);border:1px solid var(--bdr);border-radius:9px;padding:3px;}
.pbtn{padding:5px 13px;border-radius:7px;font-size:12px;font-weight:500;cursor:pointer;color:var(--mut);border:none;background:none;font-family:'Inter',sans-serif;transition:all .15s;}
.pbtn.active{background:var(--card);color:var(--txt);border:1px solid var(--bdr);}
/* TABLE */
.tw{overflow-x:auto;border-radius:13px;border:1px solid var(--bdr);}
table{width:100%;border-collapse:collapse;}
thead th{background:var(--surf);padding:10px 14px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--mut);border-bottom:1px solid var(--bdr);}
tbody td{padding:11px 14px;border-bottom:1px solid rgba(34,38,56,.5);font-size:13px;}
tbody tr:last-child td{border-bottom:none;}
tbody tr:hover td{background:rgba(255,255,255,.015);}
/* BADGE */
.badge{display:inline-flex;align-items:center;padding:2px 9px;border-radius:20px;font-size:10.5px;font-weight:600;}
.bb{background:rgba(61,123,255,.14);color:#6fa0ff;}.bg{background:rgba(0,229,160,.12);color:#00e5a0;}
.br{background:rgba(255,77,109,.12);color:#ff4d6d;}.by{background:rgba(255,176,32,.12);color:#ffb020;}
.bp{background:rgba(192,132,252,.12);color:#c084fc;}
/* SUB TABS */
.stabs{display:flex;border-bottom:1px solid var(--bdr);margin-bottom:20px;}
.stab{padding:9px 16px;font-size:13px;font-weight:500;cursor:pointer;color:var(--mut);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;user-select:none;}
.stab.active{color:var(--acc);border-bottom-color:var(--acc);}
/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:7px;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:'Inter',sans-serif;transition:all .15s;}
.btn-p{background:var(--acc);color:#fff;}.btn-p:hover{background:#2d6bef;}
.btn-g{background:transparent;color:var(--mut);border:1px solid var(--bdr);}.btn-g:hover{background:var(--card);color:var(--txt);}
/* FORM */
.fg{display:flex;flex-direction:column;gap:4px;}
.fl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--mut);}
.fi{background:var(--surf);border:1px solid var(--bdr);border-radius:8px;padding:9px 13px;color:var(--txt);font-size:13px;font-family:'Inter',sans-serif;width:100%;}
.fi:focus{outline:none;border-color:var(--acc);}
/* DEBT */
.dc{background:var(--card);border:1px solid var(--bdr);border-radius:12px;padding:16px 18px;margin-bottom:11px;}
.dc-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;}
.dc-name{font-family:'Inter',sans-serif;font-size:15px;font-weight:600;}
.dc-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;}
.dc-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--mut);margin-bottom:2px;}
.dc-val{font-size:13.5px;font-weight:700;}
.pb{height:5px;background:var(--surf);border-radius:5px;overflow:hidden;margin-top:10px;}
.pf{height:100%;border-radius:5px;}
/* DRE */
.dre-s{padding:7px 0;border-bottom:1px solid var(--bdr);}
.dre-st{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--mut);padding:5px 0 2px;}
.dre-r{display:flex;justify-content:space-between;padding:5px 0 5px 13px;font-size:13px;border-bottom:1px solid rgba(34,38,56,.4);}
.dre-r:last-child{border-bottom:none;}
.dre-t{display:flex;justify-content:space-between;padding:9px 0;font-family:'Inter',sans-serif;font-size:14px;font-weight:700;}
/* SUMMARY */
.sg{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:18px;}
.sc{background:var(--card);border:1px solid var(--bdr);border-radius:12px;padding:15px 17px;}
.sc-l{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--mut);margin-bottom:6px;}
.sc-v{font-family:'Inter',sans-serif;font-size:20px;font-weight:700;}
/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);display:flex;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(4px);}
.modal{background:var(--surf);border:1px solid var(--bdr);border-radius:15px;padding:24px;width:540px;max-width:95vw;max-height:90vh;overflow-y:auto;}
.modal-t{font-family:'Inter',sans-serif;font-size:17px;font-weight:700;margin-bottom:16px;}
/* LOGIN */
.login-w{min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at 20% 50%,rgba(61,123,255,.1) 0%,transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(0,229,160,.07) 0%,transparent 50%);}
.login-c{background:var(--card);border:1px solid var(--bdr);border-radius:18px;padding:36px 40px;width:400px;max-width:95vw;}
.login-logo{font-family:'Inter',sans-serif;font-size:24px;font-weight:800;background:linear-gradient(135deg,var(--acc),var(--acc2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:3px;}
.login-sub{font-size:12.5px;color:var(--mut);margin-bottom:26px;}
.lf{display:flex;flex-direction:column;gap:4px;margin-bottom:12px;}
.ll{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--mut);}
.li{background:var(--surf);border:1px solid var(--bdr);border-radius:8px;padding:10px 14px;color:var(--txt);font-size:14px;font-family:'Inter',sans-serif;width:100%;}
.li:focus{outline:none;border-color:var(--acc);}
.login-btn{width:100%;padding:11px;background:linear-gradient(135deg,var(--acc),#2563eb);color:#fff;border:none;border-radius:9px;font-size:14px;font-weight:600;font-family:'Inter',sans-serif;cursor:pointer;margin-top:4px;}
.login-btn:hover{opacity:.88;}
.login-err{color:var(--dan);font-size:12px;text-align:center;min-height:18px;margin-top:4px;}
.login-hint{margin-top:16px;padding:12px 14px;background:rgba(61,123,255,.07);border:1px solid rgba(61,123,255,.18);border-radius:9px;font-size:12px;color:var(--mut);}
/* COLORS */
.cg{color:var(--acc2);}.cr{color:var(--dan);}.cb{color:var(--acc);}.cy{color:var(--wrn);}
/* CHART */
.chart-box{width:100%;overflow:hidden;height:200px;}
.chart-box-sm{height:160px;}
.chart-box-lg{height:220px;}
/* QUINZENAL DROPDOWN */
.qdrop-wrap{position:relative;display:inline-block;}
.qdrop{position:absolute;top:calc(100% + 4px);right:0;background:var(--card);border:1px solid var(--bdr);border-radius:9px;padding:4px;min-width:160px;z-index:300;box-shadow:0 8px 24px rgba(0,0,0,.4);}
.qdrop-item{padding:8px 12px;border-radius:7px;font-size:12px;font-weight:500;cursor:pointer;color:var(--txt);white-space:nowrap;transition:background .12s;}
.qdrop-item:hover{background:var(--surf);}
.qdrop-item.active{color:var(--acc);background:rgba(61,123,255,.1);}
/* SCROLLBAR */
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:3px;}
</style>
</head>
<body>
<div id="app"></div>
<script>
'use strict';

// ── DATA ──────────────────────────────────────────────────────────────────────
const USERS=[
  {email:'admin@empresa.com',   senha:'admin123',nome:'Admin', empresa:'Empresa Exemplo Ltda'},
  {email:'teste@fincontrol.com',senha:'teste123',nome:'Teste', empresa:'Conta Demo'},
];
const MF=[
  {m:'Jan',fat:142000,cus:78000,dop:28400,imp:9230, luc:26370},
  {m:'Fev',fat:138000,cus:75900,dop:27600,imp:8970, luc:25530},
  {m:'Mar',fat:155000,cus:85250,dop:31000,imp:10075,luc:28675},
  {m:'Abr',fat:148000,cus:81400,dop:29600,imp:9620, luc:27380},
  {m:'Mai',fat:162000,cus:89100,dop:32400,imp:10530,luc:29970},
  {m:'Jun',fat:158000,cus:86900,dop:31600,imp:10270,luc:29230},
  {m:'Jul',fat:145000,cus:79750,dop:29000,imp:9425, luc:26825},
  {m:'Ago',fat:167000,cus:91850,dop:33400,imp:10855,luc:30895},
  {m:'Set',fat:171000,cus:94050,dop:34200,imp:11115,luc:31635},
  {m:'Out',fat:159000,cus:87450,dop:31800,imp:10335,luc:29415},
  {m:'Nov',fat:178000,cus:97900,dop:35600,imp:11570,luc:32930},
  {m:'Dez',fat:195000,cus:107250,dop:39000,imp:12675,luc:36075},
].map(d=>({...d,mar:+((d.luc/d.fat)*100).toFixed(1),ren:+((d.luc/(d.cus+d.dop))*100).toFixed(1)}));

const ENT=[
  {id:1,dt:'02/05',desc:'Pagamento — Projeto Alpha',    cat:'Serviços',   val:45000,st:'Recebido'},
  {id:2,dt:'05/05',desc:'Mensalidade — Cliente Beta',   cat:'Mensalidade',val:18000,st:'Recebido'},
  {id:3,dt:'08/05',desc:'Consultoria — Empresa Gama',   cat:'Consultoria',val:12500,st:'Recebido'},
  {id:4,dt:'12/05',desc:'Projeto Delta — Parcela 2/3',  cat:'Serviços',   val:22000,st:'Recebido'},
  {id:5,dt:'15/05',desc:'Licença Software Anual',       cat:'Licença',    val:8500, st:'Recebido'},
  {id:6,dt:'18/05',desc:'Contrato Omega — Início',      cat:'Serviços',   val:35000,st:'Previsto'},
  {id:7,dt:'22/05',desc:'Mensalidade — Cliente Epsilon',cat:'Mensalidade',val:9800, st:'Previsto'},
  {id:8,dt:'28/05',desc:'Bônus por Indicação',          cat:'Outros',     val:3500, st:'Previsto'},
];
const SAI=[
  {id:1, dt:'01/05',desc:'Folha de Pagamento',         cat:'Pessoal',    val:58000,st:'Pago'},
  {id:2, dt:'05/05',desc:'Aluguel Escritório',          cat:'Infraestrut.',val:8500,st:'Pago'},
  {id:3, dt:'07/05',desc:'AWS — Cloud Services',        cat:'Tecnologia', val:4200, st:'Pago'},
  {id:4, dt:'10/05',desc:'Impostos (DAS + IRPJ)',       cat:'Impostos',   val:16500,st:'Pago'},
  {id:5, dt:'12/05',desc:'Marketing Digital',           cat:'Marketing',  val:6800, st:'Pago'},
  {id:6, dt:'15/05',desc:'Parcela Empréstimo Banco X',  cat:'Dívidas',    val:3850, st:'Pago'},
  {id:7, dt:'18/05',desc:'Softwares e Licenças',        cat:'Tecnologia', val:2300, st:'Previsto'},
  {id:8, dt:'20/05',desc:'Energia + Internet',          cat:'Infraestrut.',val:1800,st:'Previsto'},
  {id:9, dt:'25/05',desc:'Parcela Leasing Veículo',     cat:'Dívidas',    val:2100, st:'Previsto'},
  {id:10,dt:'30/05',desc:'Contabilidade + Jurídico',    cat:'Serv. Prof.',val:3500, st:'Previsto'},
];
const DEBTS_INIT=[
  {id:1,nome:'Empréstimo Banco X',     tot:120000,parc:3850,qtd:36,pagas:8, jur:1.8,ini:'Out/2024'},
  {id:2,nome:'Leasing Veículo Empresa',tot:75600, parc:2100,qtd:36,pagas:12,jur:1.2,ini:'Abr/2024'},
  {id:3,nome:'FINAME — Equipamento',   tot:48000, parc:1600,qtd:30,pagas:18,jur:0.9,ini:'Nov/2023'},
];

// ── STATE ─────────────────────────────────────────────────────────────────────
const S={user:null,tab:'dashboard',period:'Anual',cfSub:'Entradas',resSub:'Resultado',debts:DEBTS_INIT.map(d=>({...d})),debtModal:false,showPw:false,quinzDrop:false};

// ── HELPERS ───────────────────────────────────────────────────────────────────
const fmt =v=>v==null?'—':v.toLocaleString('pt-BR',{style:'currency',currency:'BRL',maximumFractionDigits:0});
const fmtP=v=>`${(+v).toFixed(1)}%`;
const R=n=>Math.round(n*10)/10;
const catCls=c=>({'Serviços':'bb','Mensalidade':'bg','Consultoria':'bp','Licença':'by','Outros':'by','Pessoal':'br','Infraestrut.':'bb','Tecnologia':'bp','Impostos':'br','Marketing':'by','Dívidas':'br','Serv. Prof.':'bb'}[c]||'bb');
const stCls=s=>(s==='Recebido'||s==='Pago')?'bg':'by';
function _dayData(start,days){
  const b=MF[11];
  return Array.from({length:days},(_,i)=>{
    const f=0.88+0.24*Math.sin((start+i)*0.63+1.2);
    return{m:`${start+i}`,fat:Math.round(b.fat/30*f),luc:Math.round(b.luc/30*f),
      cus:Math.round(b.cus/30*f),dop:Math.round(b.dop/30*f),imp:Math.round(b.imp/30*f),
      mar:+(b.mar+Math.sin(i*0.5)*1.2).toFixed(1),ren:+(b.ren+Math.sin(i*0.4)*1.8).toFixed(1)};
  });
}
function sliceQ(half){return _dayData(half===1?1:16,half===1?15:16);}
const slice=()=>{
  if(S.period==='Q1')return sliceQ(1);
  if(S.period==='Q2')return sliceQ(2);
  if(S.period==='Mensal')return _dayData(1,31);
  return MF;
};
function totals(data){
  const fat=data.reduce((s,d)=>s+d.fat,0),luc=data.reduce((s,d)=>s+d.luc,0);
  const cus=data.reduce((s,d)=>s+d.cus,0),dop=data.reduce((s,d)=>s+d.dop,0),imp=data.reduce((s,d)=>s+d.imp,0);
  const ded=fat*0.065,rl=fat-ded,cmv=cus*0.6,lb=rl-cmv,ebt=lb-dop;
  return{fat,luc,cus,dop,imp,ded,rl,cmv,lb,ebt,mar:(luc/fat)*100,ren:(luc/(cus+dop))*100};
}

// ── SVG CHARTS ────────────────────────────────────────────────────────────────
// shared helpers
function _cr(pts){
  if(!pts.length)return'';
  let d=`M ${R(pts[0].x)} ${R(pts[0].y)}`;
  for(let i=0;i<pts.length-1;i++){
    const a=pts[Math.max(0,i-1)],b=pts[i],c=pts[i+1],e=pts[Math.min(pts.length-1,i+2)];
    const t=.34;
    d+=` C ${R(b.x+(c.x-a.x)*t)} ${R(b.y+(c.y-a.y)*t)} ${R(c.x-(e.x-b.x)*t)} ${R(c.y-(e.y-b.y)*t)} ${R(c.x)} ${R(c.y)}`;
  }
  return d;
}
function _tf(v){return v>=1e6?`${(v/1e6).toFixed(1)}M`:v>=1e3?`${(v/1e3).toFixed(0)}k`:v>=100?`${Math.round(v)}`:v.toFixed(1);}
function _rb(x,y,bw,bh,rr){
  rr=Math.min(rr,bw/2,Math.max(bh,.01)/2);
  if(bh<=0)return'';
  return `M ${R(x+rr)} ${R(y)} H ${R(x+bw-rr)} Q ${R(x+bw)} ${R(y)} ${R(x+bw)} ${R(y+rr)} V ${R(y+bh)} H ${R(x)} V ${R(y+rr)} Q ${R(x)} ${R(y)} ${R(x+rr)} ${R(y)} Z`;
}
function _gid(){return`g${Math.random().toString(36).slice(2,8)}`;}

function makeArea(series,labels,{W=580,H=210,colors=['#3d7bff','#00e5a0']}={}){
  const pl=52,pr=14,pt=20,pb=36;
  const w=W-pl-pr,h=H-pt-pb;
  const allV=series.flatMap(s=>s.d);
  const rawMx=Math.max(...allV)||1,mx=rawMx*1.12;
  const ys=v=>h-(v/mx)*h;
  const xs=i=>labels.length<2?w/2:(i/(labels.length-1))*w;
  const ticks=Array.from({length:5},(_,i)=>rawMx*i/4);
  const id=_gid();
  let g=`<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="width:100%;height:100%;display:block"><defs>`;
  colors.forEach((c,i)=>{g+=`<linearGradient id="${id}${i}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${c}" stop-opacity=".5"/><stop offset="45%" stop-color="${c}" stop-opacity=".14"/><stop offset="100%" stop-color="${c}" stop-opacity="0"/></linearGradient>`;});
  g+=`</defs><g transform="translate(${pl},${pt})">`;
  ticks.forEach((v,ti)=>{
    if(!ti)return;
    const y=R(ys(v));
    g+=`<line x1="0" y1="${y}" x2="${w}" y2="${y}" stroke="#181c2c" stroke-width="1"/>`;
    g+=`<text x="-10" y="${y+4}" text-anchor="end" fill="#38405e" font-size="10" font-weight="600" font-family="Inter,sans-serif">${_tf(v)}</text>`;
  });
  const xSt=labels.length>16?3:labels.length>9?2:1;
  labels.forEach((l,i)=>{if(i%xSt===0||i===labels.length-1)g+=`<text x="${R(xs(i))}" y="${h+26}" text-anchor="middle" fill="#38405e" font-size="10" font-weight="500" font-family="Inter,sans-serif">${l}</text>`;});
  [...series].reverse().forEach((s,rsi)=>{
    const si=series.length-1-rsi;
    const pts=s.d.map((v,i)=>({x:xs(i),y:ys(v)}));
    const cv=_cr(pts);
    const lx=R(xs(s.d.length-1));
    g+=`<path d="${cv} L ${lx} ${h} L 0 ${h} Z" fill="url(#${id}${si})"/>`;
    g+=`<path d="${cv}" fill="none" stroke="${colors[si]}" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" opacity=".12"/>`;
    g+=`<path d="${cv}" fill="none" stroke="${colors[si]}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>`;
    const lp=pts[pts.length-1];

    g+=`<circle cx="${R(lp.x)}" cy="${R(lp.y)}" r="3" fill="${colors[si]}"/>`;
  });
  g+=`<line x1="0" y1="${h}" x2="${w}" y2="${h}" stroke="#1e2236" stroke-width="1"/>`;
  g+=`</g></svg>`;return g;
}

function makeLine(series,labels,{W=580,H=180,colors=['#ffb020','#c084fc']}={}){

  const allV=series.flatMap(s=>s.d);
  const rawMn=Math.min(...allV),rawMx=Math.max(...allV);
  const rng=(rawMx-rawMn)||1,pad=rng*.18;
  const mn=rawMn-pad,mx=rawMx+pad;
  const ys=v=>h-((v-mn)/(mx-mn))*h;
  const xs=i=>labels.length<2?w/2:(i/(labels.length-1))*w;
  const ticks=Array.from({length:5},(_,i)=>rawMn+rng*i/4);
  const id=_gid();

  g+=`</defs><g transform="translate(${pl},${pt})">`;

    g+=`<text x="-10" y="${y+4}" text-anchor="end" fill="#38405e" font-size="10" font-weight="600" font-family="Inter,sans-serif">${R(v)}%</text>`;

  series.forEach((s,si)=>{

    g+=`<path d="${cv} L ${lx} ${h} L 0 ${h} Z" fill="url(#${id}${si})"/>`;
    g+=`<path d="${cv}" fill="none" stroke="${colors[si]}" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" opacity=".14"/>`;
    g+=`<path d="${cv}" fill="none" stroke="${colors[si]}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>`;
    if(s.d.length<=14){pts.forEach(p=>{g+=`<circle cx="${R(p.x)}" cy="${R(p.y)}" r="2.5" fill="${colors[si]}" opacity=".65"/>`;});}
    const lp=pts[pts.length-1];
    g+=`<circle cx="${R(lp.x)}" cy="${R(lp.y)}" r="6" fill="${colors[si]}" opacity=".18"/>`;
    g+=`<circle cx="${R(lp.x)}" cy="${R(lp.y)}" r="2.8" fill="${colors[si]}"/>`;

function makeBar(vals,labels,{W=580,H=200,colors=['#3d7bff']}={}){
  const pl=52,pr=14,pt=18,pb=38;
  const w=W-pl-pr,h=H-pt-pb;
  const n=vals.length;
  const mx=Math.max(...vals)*1.14||1;
  const gap=w/n,bw=gap*.62;
  const ticks=Array.from({length:5},(_,i)=>mx*i/4/1.14);
  const cArr=Array.isArray(colors)?colors:[colors];
  const id=_gid();
  let g=`<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="width:100%;height:100%;display:block"><defs>`;
  cArr.forEach((c,i)=>{g+=`<linearGradient id="${id}${i}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${c}" stop-opacity="1"/><stop offset="100%" stop-color="${c}" stop-opacity=".45"/></linearGradient>`;});
  g+=`</defs><g transform="translate(${pl},${pt})">`;
  ticks.forEach((v,ti)=>{
    const y=R(h-(v/mx*1.14)*h);
    if(ti>0){g+=`<line x1="0" y1="${y}" x2="${w}" y2="${y}" stroke="#181c2c" stroke-width="1"/>`;}
    g+=`<text x="-10" y="${y+4}" text-anchor="end" fill="#38405e" font-size="10" font-weight="600" font-family="Inter,sans-serif">${_tf(v)}</text>`;
  });
  vals.forEach((v,i)=>{
    const bh=(v/mx)*h,x=R(i*gap+(gap-bw)/2),y=R(h-bh);
    const ci=i%cArr.length,c=cArr[ci];
    const rr=Math.min(5,bw/4);
    if(bh>0){
      g+=`<path d="${_rb(x,y,bw,bh,rr)}" fill="url(#${id}${ci})"/>`;
      g+=`<path d="${_rb(x,y,Math.min(bh,6),bw,rr)}" fill="${c}" opacity=".1" transform="rotate(-90,${R(x+bw/2)},${R(y+3)})"/>`;
    }
    if(n<=8)g+=`<text x="${R(x+bw/2)}" y="${R(y-7)}" text-anchor="middle" fill="${c}" font-size="9.5" font-weight="700" font-family="Inter,sans-serif">${_tf(v)}</text>`;
    const lbl=labels[i]||'';
    g+=`<text x="${R(x+bw/2)}" y="${h+26}" text-anchor="middle" fill="#38405e" font-size="10" font-weight="500" font-family="Inter,sans-serif">${lbl.length>9?lbl.slice(0,8)+'…':lbl}</text>`;
  });
  g+=`<line x1="0" y1="${h}" x2="${w}" y2="${h}" stroke="#1e2236" stroke-width="1"/>`;
  g+=`</g></svg>`;return g;
}

function makePie(data,size=140){
  const cx=size/2,cy=size/2,r=size*.44,ir=r*.58;
  const gap=.045,tot=data.reduce((s,d)=>s+d.v,0);
  const id=_gid();
  let ang=-Math.PI/2,paths='',defs='';
  data.forEach((d,i)=>{
    const sl=(d.v/tot)*Math.PI*2-gap;
    const a1=ang+gap/2,a2=ang+sl+gap/2;
    const x1=cx+r*Math.cos(a1),y1=cy+r*Math.sin(a1),x2=cx+r*Math.cos(a2),y2=cy+r*Math.sin(a2);
    const ix1=cx+ir*Math.cos(a1),iy1=cy+ir*Math.sin(a1),ix2=cx+ir*Math.cos(a2),iy2=cy+ir*Math.sin(a2);
    const lg=sl>Math.PI?1:0;
    defs+=`<linearGradient id="${id}${i}" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="${d.c}" stop-opacity="1"/><stop offset="100%" stop-color="${d.c}" stop-opacity=".65"/></linearGradient>`;
    paths+=`<path d="M ${R(ix1)} ${R(iy1)} L ${R(x1)} ${R(y1)} A ${r} ${r} 0 ${lg} 1 ${R(x2)} ${R(y2)} L ${R(ix2)} ${R(iy2)} A ${ir} ${ir} 0 ${lg} 0 ${R(ix1)} ${R(iy1)} Z" fill="url(#${id}${i})"/>`;
    ang+=sl+gap;
  });
  return `<svg viewBox="0 0 ${size} ${size}" width="${size}" height="${size}"><defs>${defs}</defs>${paths}<circle cx="${cx}" cy="${cy}" r="${ir-1.5}" fill="#181c2a"/></svg>`;
}

function makeMixed(bSeries,lSeries,labels,{W=580,H=210}={}){
  const pl=52,pr=14,pt=18,pb=36;
  const w=W-pl-pr,h=H-pt-pb;
  const n=labels.length;
  const xs=i=>n<2?w/2:(i/(n-1))*w;
  const gap=w/n,bw=gap*.52;
  const bColors=['#3d7bff','#ff4d6d'];
  const lColors=['#00e5a0','#ffb020'];
  const allV=[...bSeries.flatMap(s=>s.d),...lSeries.flatMap(s=>s.d)];
  const mx=Math.max(...allV)*1.12||1;
  const ys=v=>h-(Math.max(v,0)/mx)*h;
  const ticks=Array.from({length:5},(_,i)=>Math.max(...allV)*i/4);
  const id=_gid();
  let g=`<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="width:100%;height:100%;display:block"><defs>`;
  bColors.forEach((c,i)=>{g+=`<linearGradient id="${id}${i}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${c}" stop-opacity=".9"/><stop offset="100%" stop-color="${c}" stop-opacity=".4"/></linearGradient>`;});
  g+=`</defs><g transform="translate(${pl},${pt})">`;
  ticks.forEach((v,ti)=>{
    const y=R(h-(v/Math.max(...allV,1))*h);
    if(ti>0)g+=`<line x1="0" y1="${y}" x2="${w}" y2="${y}" stroke="#181c2c" stroke-width="1"/>`;
    g+=`<text x="-10" y="${y+4}" text-anchor="end" fill="#38405e" font-size="10" font-weight="600" font-family="Inter,sans-serif">${_tf(v)}</text>`;
  });
  const xSt=n>12?2:1;
  labels.forEach((l,i)=>{if(i%xSt===0||i===n-1)g+=`<text x="${R(xs(i))}" y="${h+26}" text-anchor="middle" fill="#38405e" font-size="10" font-weight="500" font-family="Inter,sans-serif">${l}</text>`;});
  bSeries.forEach((s,si)=>{
    const nb=bSeries.length,slotW=bw/nb;
    s.d.forEach((v,i)=>{
      const bh=(v/mx)*h,x=xs(i)-bw/2+si*slotW+(slotW*.06),y=h-bh,sw=slotW*.88;
      const rr=Math.min(4,sw/4);
      if(bh>0)g+=`<path d="${_rb(x,y,sw,bh,rr)}" fill="url(#${id}${si})"/>`;
    });
  });
  lSeries.forEach((s,si)=>{
    const c=s.c||lColors[si];
    const pts=s.d.map((v,i)=>({x:xs(i),y:ys(v)}));
    const cv=_cr(pts);
    g+=`<path d="${cv}" fill="none" stroke="${c}" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" opacity=".14"/>`;
    g+=`<path d="${cv}" fill="none" stroke="${c}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>`;
    if(s.d.length<=14){pts.forEach(p=>{g+=`<circle cx="${R(p.x)}" cy="${R(p.y)}" r="2.5" fill="${c}" opacity=".7"/>`;});}
    const lp=pts[pts.length-1];
    g+=`<circle cx="${R(lp.x)}" cy="${R(lp.y)}" r="6" fill="${c}" opacity=".18"/>`;
    g+=`<circle cx="${R(lp.x)}" cy="${R(lp.y)}" r="3" fill="${c}"/>`;
  });
  g+=`<line x1="0" y1="${h}" x2="${w}" y2="${h}" stroke="#1e2236" stroke-width="1"/>`;
  g+=`</g></svg>`;return g;
}

function makeCascade(data,{W=280,H=185}={}){

function makeDebtProj(debts,{W=580,H=185,fat=167000}={}){
  const maxM=Math.max(...debts.map(d=>d.qtd-d.pagas));
  const n=Math.min(maxM,24);
  if(n<1)return'';
  const data=Array.from({length:n},(_,i)=>({mes:`M${i+1}`,tot:debts.reduce((s,d)=>i<(d.qtd-d.pagas)?s+d.parc:s,0)}));
  const pl=52,pr=14,pt=20,pb=32;
  const w=W-pl-pr,dh=H-pt-pb;
  const refVal=fat*.15;
  const mx=Math.max(...data.map(d=>d.tot),refVal)*1.18;
  const ys=v=>dh-(v/mx)*dh;
  const xs=i=>(i/(data.length-1||1))*w;

  const id=_gid();
  let g=`<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="width:100%;height:100%;display:block"><defs><linearGradient id="${id}a" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#ff4d6d" stop-opacity=".45"/><stop offset="50%" stop-color="#ff4d6d" stop-opacity=".12"/><stop offset="100%" stop-color="#ff4d6d" stop-opacity="0"/></linearGradient></defs><g transform="translate(${pl},${pt})">`;
  ticks.forEach((v,ti)=>{

    g+=`<text x="-10" y="${y+4}" text-anchor="end" fill="#38405e" font-size="10" font-weight="600" font-family="Inter,sans-serif">${_tf(v)}</text>`;
  });
  const refY=R(ys(refVal));
  g+=`<line x1="0" y1="${refY}" x2="${w}" y2="${refY}" stroke="#ffb020" stroke-dasharray="5 3" stroke-width="1.5" opacity=".8"/>`;
  g+=`<rect x="${R(w-60)}" y="${refY-15}" width="60" height="13" rx="3" fill="#ffb020" fill-opacity=".12"/>`;
  g+=`<text x="${R(w-4)}" y="${refY-5}" text-anchor="end" fill="#ffb020" font-size="9.5" font-weight="600" font-family="Inter,sans-serif">Limite 15%</text>`;
  if(data.length>1){
    const pts=data.map((d,i)=>({x:xs(i),y:ys(d.tot)}));
    const cv=_cr(pts);
    const lx=R(xs(data.length-1));
    g+=`<path d="${cv} L ${lx} ${dh} L 0 ${dh} Z" fill="url(#${id}a)"/>`;

    g+=`<circle cx="${R(lp.x)}" cy="${R(lp.y)}" r="3" fill="#ff4d6d"/>`;
  }
  data.forEach((d,i)=>{if(i%4===0||i===data.length-1)g+=`<text x="${R(xs(i))}" y="${dh+20}" text-anchor="middle" fill="#38405e" font-size="10" font-weight="500" font-family="Inter,sans-serif">${d.mes}</text>`;});
  g+=`<line x1="0" y1="${dh}" x2="${w}" y2="${dh}" stroke="#1e2236" stroke-width="1"/>`;
  g+=`</g></svg>`;return g;
}

function makeGroupBar(series,labels,{W=580,H=210,colors=['#3d7bff','#00e5a0']}={}){
  const pl=62,pr=14,pt=20,pb=36;
  const w=W-pl-pr,h=H-pt-pb;
  const n=labels.length;
  const allV=series.flatMap(s=>s.d);
  const mx=Math.max(...allV)*1.15||1;
  const ns=series.length;
  const gap=w/n;
  const grpW=gap*(n>20?.78:n>8?.82:.78);
  const barW=grpW/ns;
  const ticks=Array.from({length:5},(_,i)=>mx*i/4/1.15);
  const id=_gid();
  const fmtY=v=>v>=1e6?`R$${(v/1e6).toFixed(1)}M`:v>=1e3?`R$${(v/1e3).toFixed(0)}k`:`R$${Math.round(v)}`;
  let g=`<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="width:100%;height:100%;display:block"><defs>`;
  colors.forEach((c,i)=>{g+=`<linearGradient id="${id}${i}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${c}" stop-opacity=".95"/><stop offset="100%" stop-color="${c}" stop-opacity=".42"/></linearGradient>`;});
  g+=`</defs><g transform="translate(${pl},${pt})">`;
  // grid
  ticks.forEach((v,ti)=>{
    const y=R(h-(v/mx*1.15)*h);
    if(ti>0)g+=`<line x1="0" y1="${y}" x2="${w}" y2="${y}" stroke="#181c2c" stroke-width="1"/>`;
    g+=`<text x="-8" y="${y+4}" text-anchor="end" fill="#38405e" font-size="9.5" font-weight="600" font-family="Inter,sans-serif">${fmtY(v)}</text>`;
  });
  // x labels — smart stepping
  const xSt=n>25?5:n>15?3:n>8?2:1;
  labels.forEach((l,i)=>{
    if(i%xSt===0||i===n-1)
      g+=`<text x="${R(i*gap+gap/2)}" y="${h+24}" text-anchor="middle" fill="#38405e" font-size="${n>20?8.5:10}" font-weight="500" font-family="Inter,sans-serif">${l}</text>`;
  });
  // bars
  series.forEach((s,si)=>{
    s.d.forEach((v,i)=>{
      const bh=(v/mx)*h;
      if(bh<=0)return;
      const gx=i*gap+(gap-grpW)/2;
      const x=gx+si*barW;
      const y=h-bh;
      const rr=Math.min(3,barW*.32);
      g+=`<path d="${_rb(x,y,barW*.96,bh,rr)}" fill="url(#${id}${si})"/>`;
    });
  });
  g+=`<line x1="0" y1="${h}" x2="${w}" y2="${h}" stroke="#1e2236" stroke-width="1"/>`;
  g+=`</g></svg>`;return g;
}

    ]);

    body=`<div class="sg" style="grid-template-columns:1fr 1fr;margin-bottom:18px">
      <div class="sc"><div class="sc-l">Total Saídas</div><div class="sc-v cr">${fmt(totS)}</div><div style="font-size:12px;color:var(--mut);margin-top:4px">${SAI.filter(e=>e.st==='Pago').length} pagos · ${SAI.filter(e=>e.st==='Previsto').length} previstos</div></div>
      <div class="sc"><div class="sc-l">Maior Gasto</div><div class="sc-v">Pessoal</div><div style="font-size:12px;color:var(--mut);margin-top:4px">${fmt(58000)} · 55% das saídas</div></div>
    </div>`+table(SAI,[
      {h:'Data',v:r=>r.dt},{h:'Descrição',v:r=>`<span style="font-weight:500">${r.desc}</span>`},
      {h:'Categoria',v:r=>`<span class="badge ${catCls(r.cat)}">${r.cat}</span>`},
      {h:'Status',v:r=>`<span class="badge ${stCls(r.st)}">${r.st}</span>`},
      {h:'Valor',r:true,v:r=>`<span style="font-weight:700;color:var(--dan)">${fmt(r.val)}</span>`}
    ]);
  }else if(sub==='Resumo'){
    const catS=[{cat:'Pessoal',val:58000},{cat:'Impostos',val:16500},{cat:'Infraestrut.',val:10300},{cat:'Marketing',val:6800},{cat:'Tecnologia',val:6500},{cat:'Dívidas',val:5950}];
    body=`<div class="sg">
      <div class="sc"><div class="sc-l">Entradas</div><div class="sc-v cg">${fmt(totE)}</div></div>
      <div class="sc"><div class="sc-l">Saídas</div><div class="sc-v cr">${fmt(totS)}</div></div>
      <div class="sc"><div class="sc-l">Saldo do Período</div><div class="sc-v ${saldo>=0?'cg':'cr'}">${fmt(saldo)}</div></div>
    </div>
    <div class="card" style="margin-bottom:16px">
      <div class="ctitle">Saídas por Categoria</div>
      <div class="chart-box">${makeBar(catS.map(c=>c.val),catS.map(c=>c.cat),{colors:['#ff4d6d','#ffb020','#3d7bff','#c084fc','#00e5a0','#ff7c9b']})}</div>
    </div>
    <div class="card" style="background:rgba(255,176,32,.04);border-color:rgba(255,176,32,.25)">
      <div style="display:flex;gap:11px;align-items:flex-start">
        <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="var(--wrn)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;margin-top:1px"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        <div><div style="font-weight:600;margin-bottom:4px">Capital Mínimo Necessário</div>
        <div style="color:var(--mut);font-size:13px">Mantenha no mínimo <strong style="color:var(--wrn)">${fmt(totS*0.3)}</strong> disponível nos primeiros 10 dias do mês para cobrir obrigações fixas.</div></div>
      </div>
    </div>`;
  }else{
    const proj=Array.from({length:16},(_,i)=>{
      const day=(i+1)*2;
      const e=ENT.filter(x=>+x.dt.split('/')[0]<=day).reduce((s,x)=>s+x.val,0);
      const s=SAI.filter(x=>+x.dt.split('/')[0]<=day).reduce((s,x)=>s+x.val,0);
      return{d:day,e,s,sal:e-s};
    });
    const W=580,H=270,pl=50,pr=10,pt=10,pb=32,w=W-pl-pr,h=H-pt-pb;
    const allV=[...proj.map(p=>p.e),...proj.map(p=>p.s),...proj.map(p=>p.sal)];
    const mx=Math.max(...allV)||1,mn=Math.min(...proj.map(p=>p.sal),0);
    const rng=mx-mn||1,ys=v=>h-((v-mn)/rng)*h,xs=i=>(i/(proj.length-1))*w;
    const ticks=Array.from({length:5},(_,i)=>mn+rng*i/4);
    let svg=`<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="width:100%;height:100%;display:block"><defs><linearGradient id="psg" x1="0" y1="0" x2="0" y2="1"><stop offset="5%" stop-color="#3d7bff" stop-opacity=".28"/><stop offset="95%" stop-color="#3d7bff" stop-opacity="0"/></linearGradient></defs><g transform="translate(${pl},${pt})">`;
    ticks.forEach(v=>{const y=ys(v);svg+=`<line x1="0" y1="${R(y)}" x2="${w}" y2="${R(y)}" stroke="#222638" stroke-dasharray="3 3"/><text x="-5" y="${R(y+4)}" text-anchor="end" fill="#5e6785" font-size="11" font-family="Inter,sans-serif">${v>=1000||(v<=-1000)?`${(v/1000).toFixed(0)}k`:`${v.toFixed(0)}`}</text>`;});
    const zeroY=ys(0);
    svg+=`<line x1="0" y1="${R(zeroY)}" x2="${w}" y2="${R(zeroY)}" stroke="#ff4d6d" stroke-dasharray="4 4" stroke-width="1.5"/>`;
    // Area saldo
    const salPts=proj.map((p,i)=>`${R(xs(i))},${R(ys(p.sal))}`).join(' ');
    const salArea=`0,${R(ys(0))} ${salPts} ${R(xs(proj.length-1))},${R(ys(0))}`;
    svg+=`<polygon points="${salArea}" fill="url(#psg)"/>`;
    svg+=`<polyline points="${salPts}" fill="none" stroke="#3d7bff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>`;
    proj.forEach((p,i)=>{
      const bw=w/proj.length*0.3;
      svg+=`<rect x="${R(xs(i)-bw)}" y="${R(ys(p.e))}" width="${R(bw*0.9)}" height="${R(h-ys(p.e)-h+ys(0)+(h-ys(0)))}" fill="#00e5a0" opacity=".35" rx="2"/>`;
      svg+=`<rect x="${R(xs(i))}" y="${R(ys(p.s))}" width="${R(bw*0.9)}" height="${R(ys(0)-ys(p.s))}" fill="#ff4d6d" opacity=".35" rx="2"/>`;
    });
    proj.filter((_,i)=>i%2===0).forEach((p,i,arr)=>{const orig=proj.findIndex(x=>x.d===p.d);svg+=`<text x="${R(xs(orig))}" y="${h+20}" text-anchor="middle" fill="#5e6785" font-size="10" font-family="Inter,sans-serif">Dia ${p.d}</text>`;});
    svg+=`</g></svg>`;
    body=`<div class="card">
      <div class="ctitle">Evolução do Saldo Projetado — Maio 2025</div>
      <div class="chart-box">${svg}</div>
      <div style="margin-top:12px;padding:10px 14px;background:var(--surf);border-radius:9px;font-size:13px;color:var(--mut)">Saldo estimado ao final do mês: <strong style="color:var(--acc2)">${fmt(saldo)}</strong>.</div>
    </div>`;
  }
  return`
  <div class="ph"><div class="pt">Fluxo de Caixa</div><div class="ps">Maio 2025 — Entradas, saídas e projeções</div></div>
  <div class="pc">
    <div class="stabs">${subs.map(t=>`<div class="stab${sub===t?' active':''}" data-action="cfSub" data-v="${t}">${t}</div>`).join('')}</div>
    ${body}
  </div>`;
}

  </div></div>
  <div class="pc">
    <div class="stabs">${subs.map(t=>`<div class="stab${sub===t?' active':''}" data-action="resSub" data-v="${t}">${t}</div>`).join('')}</div>
    ${body}
  </div>`;
}

function pgEndividamento(){
  const FAT=167000;
  const debts=S.debts;
  const totP=debts.reduce((s,d)=>s+d.parc,0);
  const totD=debts.reduce((s,d)=>s+Math.max(0,d.tot-d.pagas*d.parc),0);
  const pct=(totP/FAT)*100;
  const rest=d=>d.qtd-d.pagas;
  const saldD=d=>Math.max(0,d.tot-d.pagas*d.parc);
  const pctQ=d=>Math.min(100,(d.pagas/d.qtd)*100);
  return`
  <div class="ph"><div class="ph-row">
    <div><div class="pt">Endividamento</div><div class="ps">Gestão de dívidas e comprometimento de receita</div></div>
    <button class="btn btn-p" data-action="openDebtModal">${IC.plus} Nova Dívida</button>
  </div></div>
  <div class="pc">
    <div class="kpi-g">
      <div class="kpi r"><div class="kpi-l">Saldo Devedor Total</div><div class="kpi-v cr">${fmt(totD)}</div></div>
      <div class="kpi y"><div class="kpi-l">Parcelas / Mês</div><div class="kpi-v">${fmt(totP)}</div></div>
      <div class="kpi ${pct>15?'r':'g'}"><div class="kpi-l">% do Faturamento</div><div class="kpi-v ${pct>15?'cr':'cg'}">${fmtP(pct)}</div><div style="font-size:11px;color:var(--mut);margin-top:4px">${pct>15?'⚠ Nível elevado':'✓ Saudável'}</div></div>
      <div class="kpi b"><div class="kpi-l">Dívidas Ativas</div><div class="kpi-v">${debts.length}</div></div>
    </div>
    ${debts.map(d=>`<div class="dc">
      <div class="dc-head">
        <div><div class="dc-name">${d.nome}</div><div style="font-size:11.5px;color:var(--mut);margin-top:2px">Início: ${d.ini} · Juros: ${fmtP(d.jur)} a.m.</div></div>
        <div style="display:flex;gap:8px;align-items:center">
          <span class="badge ${pctQ(d)>50?'bg':'by'}">${fmtP(pctQ(d))} quitado</span>
          <button data-action="removeDebt" data-v="${d.id}" style="background:none;border:none;cursor:pointer;padding:4px;display:flex;color:var(--mut)">${IC.x}</button>
        </div>
      </div>
      <div class="dc-grid">
        <div><div class="dc-lbl">Valor Total</div><div class="dc-val">${fmt(d.tot)}</div></div>
        <div><div class="dc-lbl">Saldo Devedor</div><div class="dc-val cr">${fmt(saldD(d))}</div></div>
        <div><div class="dc-lbl">Parcela Mensal</div><div class="dc-val">${fmt(d.parc)}</div></div>
        <div><div class="dc-lbl">Parc. Restantes</div><div class="dc-val">${rest(d)}x de ${d.qtd}</div></div>
        <div><div class="dc-lbl">Quitação</div><div class="dc-val" style="font-size:13px">~${rest(d)} meses</div></div>
      </div>
      <div class="pb" style="margin-top:12px;height:6px"><div class="pf" style="width:${pctQ(d)}%;background:${pctQ(d)>60?'var(--acc2)':'var(--wrn)'}"></div></div>
      <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--mut);margin-top:3px"><span>${d.pagas} pagas</span><span>${rest(d)} restantes</span></div>
    </div>`).join('')}
    <div class="card" style="margin-top:4px">
      <div class="ctitle">Projeção de Parcelas — Próximos Meses</div>
      ${makeDebtProj(debts)}
      <div style="margin-top:12px;padding:10px 14px;background:var(--surf);border-radius:9px;font-size:12.5px;color:var(--mut)">Comprometimento atual: <strong style="color:${pct>15?'var(--dan)':'var(--acc2)'}">${fmtP(pct)}</strong> do faturamento mensal. Limite recomendado: 15%.</div>
    </div>
  </div>
  ${S.debtModal?`<div class="overlay" data-action="closeModal">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-t">Lançar Nova Dívida</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:13px;margin-bottom:18px">
        <div class="fg" style="grid-column:1/-1"><label class="fl">Nome da Dívida</label><input class="fi" id="f-nome" placeholder="Empréstimo Banco X"/></div>
        <div class="fg"><label class="fl">Valor Total (R$)</label><input class="fi" id="f-tot" type="number" placeholder="120000"/></div>
        <div class="fg"><label class="fl">Valor da Parcela (R$)</label><input class="fi" id="f-parc" type="number" placeholder="3850"/></div>
        <div class="fg"><label class="fl">Qtd. de Parcelas</label><input class="fi" id="f-qtd" type="number" placeholder="36"/></div>
        <div class="fg"><label class="fl">Parcelas Já Pagas</label><input class="fi" id="f-pagas" type="number" placeholder="0"/></div>
        <div class="fg"><label class="fl">Juros (% a.m.)</label><input class="fi" id="f-jur" type="number" placeholder="1.5"/></div>
        <div class="fg"><label class="fl">Data de Início</label><input class="fi" id="f-ini" placeholder="Jan/2025"/></div>
      </div>
      <div style="display:flex;gap:10px;justify-content:flex-end">
        <button class="btn btn-g" data-action="closeModal">Cancelar</button>
        <button class="btn btn-p" data-action="addDebt">${IC.ok} Lançar Dívida</button>
      </div>
    </div>
  </div>`:''}`;
}

function pgLogin(){
  return`<div class="login-w"><div class="login-c">
    <div class="login-logo">FinControl</div>
    <div class="login-sub">Plataforma de gestão financeira empresarial</div>
    <div style="font-family:'Inter',sans-serif;font-size:18px;font-weight:700;margin-bottom:20px">Acesse sua conta</div>
    <div class="lf"><label class="ll">E-mail</label><input class="li" id="l-email" type="email" placeholder="seu@email.com"/></div>
    <div class="lf">
      <label class="ll">Senha</label>
      <div style="position:relative">
        <input class="li" id="l-senha" type="${S.showPw?'text':'password'}" placeholder="••••••••" style="padding-right:44px"/>
        <button data-action="togglePw" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;display:flex;color:var(--mut)">${S.showPw?IC.eyeo:IC.eye}</button>

      <div>📧 <strong>admin@empresa.com</strong> &nbsp;·&nbsp; 🔑 <strong>admin123</strong></div>
      <div style="margin-top:4px">📧 <strong>teste@fincontrol.com</strong> &nbsp;·&nbsp; 🔑 <strong>teste123</strong></div>

function pgApp(){
  const nav=[{id:'dashboard',l:'Painel Inicial',ic:'home'},{id:'cashflow',l:'Fluxo de Caixa',ic:'flow'},{id:'results',l:'Resultados',ic:'bar'},{id:'debt',l:'Endividamento',ic:'crd'}];
  let content='';
  if(S.tab==='dashboard') content=pgDashboard();
  else if(S.tab==='cashflow') content=pgCashflow();
  else if(S.tab==='results') content=pgResultados();
  else if(S.tab==='debt') content=pgEndividamento();
  return`<div class="app">
    <div class="sb">
      <div class="sb-logo"><div class="logo-n">FinControl</div><div class="logo-s">Gestão Financeira</div></div>
      <nav class="sb-nav">
        <div class="nav-grp">Menu</div>
        ${nav.map(item=>`<div class="nav-item${S.tab===item.id?' active':''}" data-action="tab" data-v="${item.id}">${IC[item.ic]}${item.l}</div>`).join('')}
      </nav>
      <div class="sb-foot">
        <div style="display:flex;align-items:center;gap:10px;flex:1;overflow:hidden">
          <div class="av">${S.user.nome[0]}</div>
          <div style="overflow:hidden"><div style="font-size:12.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${S.user.nome}</div><div style="font-size:10.5px;color:var(--mut);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${S.user.empresa}</div></div>
        </div>
        <button class="logout-btn" data-action="logout" title="Sair">${IC.out}</button>
      </div>
    </div>
    <div class="main">${content}</div>
  </div>`;
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render(){
  document.getElementById('app').innerHTML=S.user?pgApp():pgLogin();
}

// ── EVENTS ───────────────────────────────────────────────────────────────────
document.addEventListener('click',function(e){
  const el=e.target.closest('[data-action]');
  if(!el)return;
  const act=el.dataset.action,val=el.dataset.v;
  if(act==='tab'){S.tab=val;S.quinzDrop=false;render();window.scrollTo(0,0);}
  else if(act==='toggleQuinzDrop'){S.quinzDrop=!S.quinzDrop;render();}
  else if(act==='period'){S.period=val;S.quinzDrop=false;render();}
  else if(act==='cfSub'){S.cfSub=val;render();}
  else if(act==='resSub'){S.resSub=val;render();}
  else if(act==='togglePw'){S.showPw=!S.showPw;render();}
  else if(act==='login'){
    const email=document.getElementById('l-email')?.value.trim().toLowerCase()||'';
    const senha=document.getElementById('l-senha')?.value||'';
    const u=USERS.find(u=>u.email===email&&u.senha===senha);
    if(u){S.user=u;try{sessionStorage.setItem('fc_user',JSON.stringify(u));}catch(e){}render();}
    else{const err=document.getElementById('l-err');if(err)err.textContent='E-mail ou senha incorretos.';}
  }
  else if(act==='logout'){S.user=null;try{sessionStorage.removeItem('fc_user');}catch(e){}S.tab='dashboard';render();}
  else if(act==='openDebtModal'){S.debtModal=true;render();}
  else if(act==='closeModal'){S.debtModal=false;render();}
  else if(act==='addDebt'){
    const nome=document.getElementById('f-nome')?.value||'';
    const tot=+document.getElementById('f-tot')?.value||0;
    const parc=+document.getElementById('f-parc')?.value||0;
    const qtd=+document.getElementById('f-qtd')?.value||0;
    const pagas=+document.getElementById('f-pagas')?.value||0;
    const jur=+document.getElementById('f-jur')?.value||0;
    const ini=document.getElementById('f-ini')?.value||'';
    if(!nome||!tot)return;
    S.debts=[...S.debts,{id:Date.now(),nome,tot,parc,qtd,pagas,jur,ini}];
    S.debtModal=false;render();
  }
  else if(act==='removeDebt'){S.debts=S.debts.filter(d=>d.id!=val);render();}
  // close quinzenal dropdown when clicking outside
  if(!e.target.closest('.qdrop-wrap')&&S.quinzDrop){S.quinzDrop=false;render();}
});

document.addEventListener('keydown',function(e){
  if(e.key==='Enter'&&!S.user){
    document.querySelector('[data-action="login"]')?.click();
  }
});

// ── INIT ──────────────────────────────────────────────────────────────────────
try{const s=sessionStorage.getItem('fc_user');if(s)S.user=JSON.parse(s);}catch(e){}
render();
</script>
</body>
</html>
